<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM EJC - PNSPS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1e293b; --accent: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1e293b; }
        .container { max-width: 900px; margin: auto; }
        
        /* Login */
        #loginPage { max-width: 350px; margin: 100px auto; background: white; padding: 40px; border-radius: 24px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 14px; margin: 15px 0; border: 1.5px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; }
        
        /* Dashboard */
        .header-painel { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .btn { border: none; border-radius: 12px; padding: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; display: block; width: 100%; text-decoration: none; text-align: center; margin-bottom: 15px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: #22c55e; color: white; }
        .btn-individual { background: #eff6ff; color: var(--accent); padding: 8px; font-size: 0.8rem; margin: 0; }
        
        .card-jovem { background: white; padding: 20px; border-radius: 16px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border: 1px solid #f1f5f9; }
        .card-info { display: grid; grid-template-columns: 1fr auto; align-items: center; }
        .loading { text-align: center; padding: 40px; font-weight: bold; color: var(--accent); }
    </style>
</head>
<body>

    <div id="loginPage">
        <img src="1774975668180.png" style="width:80px; border-radius:50%; margin-bottom:15px;">
        <h2>EJC ADM</h2>
        <input type="password" id="senha" placeholder="Senha de acesso">
        <button class="btn btn-primary" onclick="logar()">ENTRAR</button>
    </div>

    <div id="dashPage" style="display:none;" class="container">
        <div class="header-painel">
            <div>
                <h1 style="margin:0; font-size:1.5rem;">Inscritos 2026</h1>
                <small style="color:#64748b">Paróquia N. S. Perpétuo Socorro</small>
            </div>
            <button onclick="carregarDados()" style="background:none; border:none; cursor:pointer; color:var(--accent)"><i class="fas fa-sync-alt fa-2x"></i></button>
        </div>

        <button class="btn btn-primary" onclick="gerarRelatorioGeral()">
            <i class="fas fa-file-pdf"></i> BAIXAR RELATÓRIO COMPLETO
        </button>

        <button class="btn btn-success" onclick="compartilharWhatsApp()">
            <i class="fab fa-whatsapp"></i> NOTIFICAR EQUIPE (WHATSAPP)
        </button>

        <div id="listaContainer">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i> Sincronizando com Google Sheets...</div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzo_A9kOeOpWkYXWREznU7zPE9UDQVLah2fI5CLv_Yl-aRCiZkegTnw8uRa6fTb78ny/exec";
        let inscritos = [];

        function logar() {
            if(document.getElementById('senha').value === "ejc2026") {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('dashPage').style.display = 'block';
                carregarDados();
            } else { alert("Senha incorreta!"); }
        }

        async function carregarDados() {
            const container = document.getElementById('listaContainer');
            container.innerHTML = '<div class="loading">Atualizando...</div>';
            try {
                const res = await fetch(SCRIPT_URL);
                inscritos = await res.json();
                renderizarCards();
            } catch (e) { container.innerHTML = "Erro ao carregar dados da planilha."; }
        }

        function renderizarCards() {
            const container = document.getElementById('listaContainer');
            container.innerHTML = "";
            inscritos.forEach(p => {
                container.innerHTML += `
                    <div class="card-jovem">
                        <div class="card-info">
                            <div>
                                <b style="text-transform:uppercase; font-size:1.1rem;">${p.Nome || "---"}</b>
                                <div style="font-size:0.85rem; color:#64748b; margin-top:5px;">
                                    CPF: ${p.CPF || "---"} | Bairro: ${p.Bairro || "---"}
                                </div>
                            </div>
                            <button class="btn btn-individual" onclick="gerarFichaIndividual(${p.row})">VER FICHA</button>
                        </div>
                    </div>`;
            });
        }

        function gerarRelatorioGeral() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            doc.setFontSize(18);
            doc.text("LISTA GERAL DE INSCRITOS - EJC 2026", 14, 15);

            const cabecalho = [["NOME", "CPF", "NASCIMENTO", "WHATSAPP", "RUA", "BAIRRO", "CIDADE"]];
            const linhas = inscritos.map(p => [
                p.Nome, p.CPF, p.Idade, p.whatsapp, p.Rua, p.Bairro, p.Cidade
            ]);

            doc.autoTable({
                head: cabecalho,
                body: linhas,
                startY: 25,
                styles: { fontSize: 9 },
                headStyles: { fillColor: [30, 41, 59] }
            });
            doc.save("Relatorio_EJC_2026.pdf");
        }

        function gerarFichaIndividual(linha) {
            const p = inscritos.find(i => i.row == linha);
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            doc.setFillColor(30, 41, 59);
            doc.rect(0, 0, 210, 40, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(22);
            doc.text("FICHA DE INSCRIÇÃO", 20, 25);

            doc.setTextColor(0);
            doc.setFontSize(12);
            let y = 60;
            const dados = [
                ["NOME COMPLETO:", p.Nome.toUpperCase()],
                ["CPF:", p.CPF],
                ["DATA NASCIMENTO:", p.Idade],
                ["WHATSAPP:", p.whatsapp],
                ["ENDEREÇO:", p.Rua],
                ["BAIRRO:", p.Bairro],
                ["CIDADE:", p.Cidade]
            ];

            dados.forEach(d => {
                doc.setFont("helvetica", "bold"); doc.text(d[0], 20, y);
                doc.setFont("helvetica", "normal"); doc.text(String(d[1]), 70, y);
                y += 12;
            });

            doc.save(`Ficha_${p.Nome}.pdf`);
        }

        function compartilharWhatsApp() {
            const texto = window.encodeURIComponent("Olá! O relatório de inscritos do EJC 2026 foi atualizado no painel. Por favor, verifiquem os novos nomes.");
            window.open(`https://api.whatsapp.com/send?text=${texto}`);
        }
    </script>
</body>
</html>
