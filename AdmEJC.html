<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Gestão EJC</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        
        /* LOGIN */
        #loginScreen { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; width: 320px; }
        .login-input { width: 100%; padding: 12px; margin: 20px 0; border: 1px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; }

        /* DASHBOARD */
        #dashboard { display: none; width: 95%; max-width: 900px; align-self: flex-start; margin-top: 20px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 18px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border-left: 5px solid var(--primary); }
        
        .action-box { background: white; padding: 20px; border-radius: 18px; margin-top: 20px; }
        .btn { padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .btn-pdf { background: #fee2e2; color: #dc2626; }
        .btn-send { background: #dcfce7; color: #16a34a; }
        .btn-select { background: #e0e7ff; color: #4338ca; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; padding: 12px; color: #64748b; font-size: 0.8rem; text-transform: uppercase; }
        td { padding: 15px 12px; border-top: 1px solid #f1f5f9; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <img src="1774975668180.png" style="width: 80px; border-radius: 50%;">
        <h2 style="color:var(--primary)">EJC ADM</h2>
        <input type="text" id="userLogin" class="login-input" placeholder="Seu Usuário">
        <button class="btn" style="background:var(--primary); color:white; width:100%; justify-content:center" onclick="entrar()">ACESSAR PAINEL</button>
    </div>

    <div id="dashboard">
        <div class="top-bar">
            <div>
                <h2 style="margin:0">Bem-vindo, <span id="adminName"></span>!</h2>
                <small style="color:#64748b">Gestão de Fichas PNSPS</small>
            </div>
            <button class="btn btn-pdf" onclick="alert('Baixando PDF Geral...')">📥 BAIXAR PDF GERAL</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <small>Total de Inscritos</small>
                <div style="font-size: 1.5rem; font-weight: bold;">42 Jovens</div>
            </div>
            <div class="stat-card" style="border-color: #facc15;">
                <small>Aguardando Foto</small>
                <div style="font-size: 1.5rem; font-weight: bold;">05</div>
            </div>
        </div>

        <div class="action-box">
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <h3 style="margin:0">Inscrições Recentes</h3>
                <button class="btn btn-send" onclick="alert('Selecione os arquivos para enviar ao Padre')">📧 ENVIAR PDF PARA PADRE</button>
            </div>
            
            <table>
                <thead>
                    <tr><th>CPF</th> <th>Nome</th> <th>Bairro</th> <th>Ações</th></tr>
                </thead>
                <tbody>
                    <tr>
                        <td style="font-family: monospace;">123.456.789-00</td>
                        <td><b>Marcos Oliveira</b></td>
                        <td>Pajuçara</td>
                        <td>
                            <button class="btn btn-select" onclick="alert('Ficha selecionada para edição/impressão')">🔍 SELECIONAR FICHA</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function entrar() {
            const user = document.getElementById('userLogin').value;
            if(user) {
                document.getElementById('adminName').innerText = user;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.body.style.alignItems = 'flex-start';
            } else { alert("Digite seu nome de usuário"); }
        }
    </script>
</body>
</html>
