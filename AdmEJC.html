<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM EJC - PNSPS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1e293b; --accent: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #1e293b; }
        .container { max-width: 900px; margin: auto; }
        .btn { border: none; border-radius: 12px; padding: 16px; font-weight: bold; cursor: pointer; display: block; width: 100%; text-decoration: none; text-align: center; margin-bottom: 15px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: #22c55e; color: white; }
        .card-jovem { background: white; padding: 20px; border-radius: 16px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border: 1px solid #f1f5f9; }
        #loginPage { max-width: 350px; margin: 100px auto; background: white; padding: 40px; border-radius: 24px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 14px; margin: 15px 0; border: 1.5px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; }
        .loading { text-align: center; padding: 40px; font-weight: bold; color: var(--accent); }
    </style>
</head>
<body>

    <div id="loginPage">
        <img src="1774975668180.png" style="width:80px; border-radius:50%; margin-bottom:15px;">
        <h2>EJC ADM</h2>
        <input type="password" id="senha" placeholder="Senha de acesso">
        <button class="btn btn-primary" onclick="logar()">ENTRAR</button>
    </div>

    <div id="dashPage" style="display:none;" class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h1 style="margin:0; font-size:1.5rem;">Inscritos 2026</h1>
            <button onclick="carregarDados()" style="background:none; border:none; cursor:pointer; color:var(--accent)"><i class="fas fa-sync-alt fa-2x"></i></button>
        </div>

        <button class="btn btn-primary" onclick="gerarRelatorioGeral()">
            <i class="fas fa-file-pdf"></i> BAIXAR RELATÓRIO COMPLETO
        </button>

        <div id="listaContainer">
            <div class="loading">Sincronizando...</div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzo_A9kOeOpWkYXWREznU7zPE9UDQVLah2fI5CLv_Yl-aRCiZkegTnw8uRa6fTb78ny/exec";
        let inscritos = [];

        function logar() {
            if(document.getElementById('senha').value === "ejc2026") {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('dashPage').style.display = 'block';
                carregarDados();
            } else { alert("Senha incorreta!"); }
        }

        async function carregarDados() {
            const container = document.getElementById('listaContainer');
            container.innerHTML = '<div class="loading">Buscando dados...</div>';
            try {
                const res = await fetch(SCRIPT_URL);
                inscritos = await res.json();
                renderizar();
            } catch (e) { container.innerHTML = "Erro ao conectar com a planilha."; }
        }

        // Função de segurança para pegar dados independente de maiúsculas/minúsculas
        function campo(obj, nome) {
            return obj[nome] || obj[nome.toLowerCase()] || obj[nome.charAt(0).toUpperCase() + nome.slice(1)] || "---";
        }

        function renderizar() {
            const container = document.getElementById('listaContainer');
            container.innerHTML = "";
            inscritos.forEach(p => {
                container.innerHTML += `
                    <div class="card-jovem">
                        <b style="text-transform:uppercase; font-size:1.1rem;">${campo(p, 'Nome')}</b>
                        <p style="font-size:0.85rem; color:#64748b; margin-top:5px;">
                            CPF: ${campo(p, 'CPF')} | Bairro: ${campo(p, 'Bairro')}
                        </p>
                        <button class="btn btn-primary" style="margin:10px 0 0 0; padding:10px; font-size:0.8rem;" onclick="gerarFichaIndividual(${p.row})">BAIXAR FICHA</button>
                    </div>`;
            });
        }

        function gerarRelatorioGeral() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            doc.text("RELATÓRIO DE INSCRITOS EJC 2026", 14, 15);

            const cabecalho = [["NOME", "CPF", "IDADE", "WHATSAPP", "BAIRRO", "CIDADE"]];
            const linhas = inscritos.map(p => [
                campo(p, 'Nome'), campo(p, 'CPF'), campo(p, 'Idade'), 
                campo(p, 'whatsapp'), campo(p, 'Bairro'), campo(p, 'Cidade')
            ]);

            doc.autoTable({
                head: cabecalho, body: linhas, startY: 25,
                styles: { fontSize: 9 }, headStyles: { fillColor: [30, 41, 59] }
            });
            doc.save("Relatorio_EJC_2026.pdf");
        }

        function gerarFichaIndividual(linha) {
            const p = inscritos.find(i => i.row == linha);
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFontSize(18);
            doc.text("FICHA DE INSCRIÇÃO", 105, 20, {align: 'center'});
            
            doc.setFontSize(12);
            let y = 40;
            const dados = [
                ["NOME:", campo(p, 'Nome').toUpperCase()],
                ["CPF:", campo(p, 'CPF')],
                ["NASCIMENTO/IDADE:", campo(p, 'Idade')],
                ["WHATSAPP:", campo(p, 'whatsapp')],
                ["RUA:", campo(p, 'Rua')],
                ["BAIRRO:", campo(p, 'Bairro')],
                ["CIDADE:", campo(p, 'Cidade')]
            ];

            dados.forEach(d => {
                doc.setFont("helvetica", "bold"); doc.text(d[0], 20, y);
                doc.setFont("helvetica", "normal"); doc.text(String(d[1]), 70, y);
                y += 12;
            });

            doc.save(`Ficha_${campo(p, 'Nome')}.pdf`);
        }
    </script>
</body>
</html>
