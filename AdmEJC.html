<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM EJC - PNSPS</title>
    <link rel="manifest" href="manifest-adm-ejc.json">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw-ejc.js');
      }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1e293b; --accent: #2563eb; --danger: #ef4444; --bg: #f8fafc; --success: #16a34a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 900px; margin: auto; }
        
        .stats { background: var(--primary); color: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .stats h2 { margin: 0; font-size: 1.8rem; }
        .stats small { opacity: 0.8; text-transform: uppercase; letter-spacing: 1px; }

        .bairro-menu { display: flex; overflow-x: auto; gap: 10px; padding: 10px 0; margin-bottom: 20px; scrollbar-width: none; }
        .bairro-menu::-webkit-scrollbar { display: none; }
        .bairro-item { background: white; padding: 10px 20px; border-radius: 20px; white-space: nowrap; cursor: pointer; border: 1px solid #e2e8f0; font-weight: 600; color: #64748b; transition: all 0.3s; }
        .bairro-item.active { background: var(--accent); color: white; border-color: var(--accent); transform: scale(1.05); }

        .lista-jovens { display: grid; gap: 12px; }
        .card-jovem { background: white; padding: 12px; border-radius: 18px; display: flex; align-items: center; gap: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; position: relative; overflow: hidden; }
        
        .foto-perfil-card { width: 60px; height: 60px; border-radius: 15px; object-fit: cover; background: #e2e8f0; border: 2px solid #f1f5f9; }
        
        .info-principal { flex-grow: 1; }
        .info-principal h3 { margin: 0; font-size: 1.05rem; color: var(--primary); text-transform: uppercase; font-weight: 700; }
        .info-principal p { margin: 4px 0 0; color: #64748b; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; }
        .info-principal .bairro-tag { background: #f1f5f9; padding: 2px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; color: var(--accent); }
        
        .acoes { display: flex; gap: 10px; }
        .btn-acao { border: none; width: 48px; height: 48px; border-radius: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: all 0.2s; }
        .btn-pdf { background: #fee2e2; color: var(--danger); }
        .btn-whatsapp { background: #dcfce7; color: var(--success); }
        
        #loading { text-align: center; padding: 60px; color: #64748b; font-weight: 500; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .btn-relatorio { background: var(--accent); color: white; border: none; padding: 20px; border-radius: 18px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 30px; display: flex; align-items: center; justify-content: center; gap: 12px; font-size: 1.05rem; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }

        @media (max-width: 480px) {
            .stats h2 { font-size: 1.5rem; }
            .card-jovem { padding: 10px; gap: 10px; }
            .foto-perfil-card { width: 50px; height: 50px; }
            .info-principal h3 { font-size: 0.95rem; }
            .btn-acao { width: 42px; height: 42px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="stats">
        <div><small>Inscritos Confirmados</small><h2 id="totalGeral">0</h2></div>
        <img src="ejcmaracanau.jpeg" style="width: 65px; height: 65px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.2); object-fit: cover;">
    </div>

    <div id="bairrosMenu" class="bairro-menu">
        <div class="bairro-item active" onclick="filtrar('TODOS', this)">TODOS</div>
    </div>

    <div id="loading">
        <i class="fas fa-circle-notch fa-spin fa-3x" style="color: var(--accent)"></i>
        <span>Sincronizando dados...</span>
    </div>

    <div id="lista" class="lista-jovens"></div>

    <button class="btn-relatorio" onclick="gerarRelatorioGeral()">
        <i class="fas fa-file-pdf"></i> GERAR RELATÓRIO GERAL (PDF)
    </button>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzo_A9kOeOpWkYXWREznU7zPE9UDQVLah2fI5CLv_Yl-aRCiZkegTnw8uRa6fTb78ny/exec";
    let todosDados = [];
    const FOTO_SEM_PERFIL = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=";

    async function carregarDados() {
        try {
            const response = await fetch(SCRIPT_URL);
            todosDados = await response.json();
            document.getElementById('loading').style.display = 'none';
            document.getElementById('totalGeral').innerText = todosDados.length;
            configurarFiltros();
            renderizarLista(todosDados);
        } catch (e) {
            document.getElementById('loading').innerHTML = "<p>Erro ao conectar com a planilha.</p>";
        }
    }

    function configurarFiltros() {
        const bairrosRaw = todosDados.map(item => item.Bairro).filter(b => b);
        const bairros = ['TODOS', ...new Set(bairrosRaw)].sort();
        const menu = document.getElementById('bairrosMenu');
        menu.innerHTML = '';
        bairros.forEach(b => {
            const div = document.createElement('div');
            div.className = `bairro-item ${b === 'TODOS' ? 'active' : ''}`;
            div.innerText = b.toUpperCase();
            div.onclick = () => filtrar(b, div);
            menu.appendChild(div);
        });
    }

    function filtrar(bairro, elemento) {
        document.querySelectorAll('.bairro-item').forEach(i => i.classList.remove('active'));
        elemento.classList.add('active');
        renderizarLista(bairro === 'TODOS' ? todosDados : todosDados.filter(i => i.Bairro === bairro));
    }

    function renderizarLista(dados) {
        const lista = document.getElementById('lista');
        lista.innerHTML = '';
        dados.forEach(p => {
            // Lendo 'foto (link)' conforme sua planilha
            const fRaw = p["foto (link)"] || p.foto || "";
            const fotoValida = (fRaw.length > 100) ? fRaw : FOTO_SEM_PERFIL;
            
            const card = document.createElement('div');
            card.className = 'card-jovem';
            card.innerHTML = `
                <img src="${fotoValida}" class="foto-perfil-card">
                <div class="info-principal">
                    <h3>${p.Nome || ''}</h3>
                    <p><span class="bairro-tag">${p.Bairro || ''}</span></p>
                </div>
                <div class="acoes">
                    <button class="btn-acao btn-whatsapp" onclick="window.open('https://wa.me/55${p.whatsapp.replace(/\D/g,'')}')"><i class="fab fa-whatsapp"></i></button>
                    <button class="btn-acao btn-pdf" onclick='gerarPDFIndividual(${JSON.stringify(p)})'><i class="fas fa-file-pdf"></i></button>
                </div>`;
            lista.appendChild(card);
        });
    }

    function gerarPDFIndividual(p) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFillColor(30, 41, 59); doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255); doc.setFontSize(20); doc.text("FICHA DE INSCRIÇÃO EJC", 105, 25, { align: 'center' });
        const foto = p["foto (link)"] || p.foto;
        if(foto && foto.length > 100) { try { doc.addImage(foto, 'JPEG', 150, 45, 40, 50); } catch(e) {} }
        doc.setTextColor(0); doc.setFontSize(12);
        let y = 60;
        [["NOME:", p.Nome], ["CPF:", p.CPF], ["NASCIMENTO:", p.Idade], ["WHATSAPP:", p.whatsapp], ["BAIRRO:", p.Bairro], ["RUA:", p.Rua], ["CIDADE:", p.Cidade]].forEach(c => {
            doc.setFont(undefined, 'bold'); doc.text(c[0], 20, y);
            doc.setFont(undefined, 'normal'); doc.text(String(c[1] || ""), 70, y);
            y += 12;
        });
        doc.save(`Ficha_${p.Nome}.pdf`);
    }

    function gerarRelatorioGeral() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', 'a4');
        doc.text("LISTAGEM GERAL EJC 2026", 14, 15);
        doc.autoTable({ head: [['Nome', 'CPF', 'WhatsApp', 'Bairro']], body: todosDados.map(p => [p.Nome, p.CPF, p.whatsapp, p.Bairro]), startY: 25 });
        doc.save("Relatorio_EJC.pdf");
    }
    carregarDados();
</script>
</body>
</html>
