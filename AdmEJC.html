<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM EJC - PNSPS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1e293b; --accent: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 900px; margin: auto; }
        .btn { border: none; border-radius: 12px; padding: 15px; font-weight: bold; cursor: pointer; display: block; width: 100%; text-decoration: none; text-align: center; transition: 0.3s; margin-bottom: 15px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: #22c55e; color: white; }
        .btn-photo { background: #f59e0b; color: white; margin-top: 10px; font-size: 0.8rem; padding: 10px; }
        .card-jovem { background: white; padding: 20px; border-radius: 16px; margin-bottom: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border: 1px solid #f1f5f9; }
        #loginPage { max-width: 350px; margin: 100px auto; background: white; padding: 40px; border-radius: 24px; text-align: center; }
        input { width: 100%; padding: 14px; margin: 15px 0; border: 1.5px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; }
        .modal-foto { display:none; position:fixed; z-index:2000; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); align-items:center; justify-content:center; flex-direction: column; }
        .modal-foto img { max-width: 95%; max-height: 85%; border-radius: 8px; border: 4px solid white; box-shadow: 0 0 20px rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <div id="loginPage">
        <img src="1774975668180.png" style="width:80px; border-radius:50%; margin-bottom:15px;">
        <h2>EJC ADM</h2>
        <input type="password" id="senha" placeholder="Senha do Painel">
        <button class="btn btn-primary" onclick="logar()">ENTRAR</button>
    </div>

    <div id="dashPage" style="display:none;" class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
            <h1>Inscritos 2026</h1>
            <button onclick="carregarDados()" style="background:none; border:none; cursor:pointer; color:var(--accent)"><i class="fas fa-sync-alt fa-2x"></i></button>
        </div>
        <button class="btn btn-primary" onclick="gerarRelatorioGeral()">BAIXAR RELATÓRIO PDF</button>
        <button class="btn btn-success" onclick="compartilharZap()">NOTIFICAR EQUIPE (ZAP)</button>
        <div id="listaContainer">Sincronizando...</div>
    </div>

    <div id="modalFoto" class="modal-foto" onclick="this.style.display='none'">
        <img id="imgExpandida" src="">
        <p style="color:white; margin-top:15px; font-weight:bold;">Toque para fechar</p>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzo_A9kOeOpWkYXWREznU7zPE9UDQVLah2fI5CLv_Yl-aRCiZkegTnw8uRa6fTb78ny/exec";
        let inscritos = [];

        function logar() {
            if(document.getElementById('senha').value === "ejc2026") {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('dashPage').style.display = 'block';
                carregarDados();
            } else { alert("Senha incorreta!"); }
        }

        async function carregarDados() {
            const container = document.getElementById('listaContainer');
            container.innerHTML = "Atualizando lista...";
            const res = await fetch(SCRIPT_URL);
            inscritos = await res.json();
            renderizar();
        }

        function renderizar() {
            const container = document.getElementById('listaContainer');
            container.innerHTML = "";
            inscritos.forEach(p => {
                // SÓ mostra o botão se houver Base64 salvo na coluna J ("Foto (link)")
                let botaoFoto = p['Foto (link)'] && p['Foto (link)'].includes('base64') 
                    ? `<button class="btn btn-photo" onclick="verFoto('${p.row}')"><i class="fas fa-id-card"></i> VER FOTO 3x4</button>` 
                    : `<span style="font-size:0.75rem; color:#94a3b8; font-style:italic;">(Sem foto na planilha)</span>`;

                container.innerHTML += `
                    <div class="card-jovem">
                        <b style="font-size:1.1rem; text-transform:uppercase; color:#1e293b">${p.Nome}</b>
                        <p style="font-size:0.85rem; color:#64748b; margin:5px 0;">CPF: ${p.CPF} | Bairro: ${p.Bairro}</p>
                        <div style="display:flex; gap:10px; align-items:center; border-top:1px solid #f1f5f9; padding-top:10px; margin-top:10px;">
                             <button class="btn btn-primary" style="font-size:0.75rem; padding:8px; margin:0; flex:1;" onclick="gerarFicha(${p.row})">BAIXAR FICHA</button>
                             <div style="flex:1; text-align:center">${botaoFoto}</div>
                        </div>
                    </div>`;
            });
        }

        function verFoto(linha) {
            const p = inscritos.find(i => i.row == linha);
            // Pega o dado da coluna 'Foto (link)'
            if(p['Foto (link)']) {
                document.getElementById('imgExpandida').src = p['Foto (link)'];
                document.getElementById('modalFoto').style.display = 'flex';
            }
        }

        // Funções PDF e Zap simplificadas para o PC
        function gerarRelatorioGeral() { /* ... lógica já existente ... */ }
        function gerarFicha(linha) { /* ... lógica já existente ... */ }
        function compartilharZap() { /* ... lógica já existente ... */ }
    </script>
</body>
</html>
