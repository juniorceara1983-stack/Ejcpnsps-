<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM EJC - PNSPS</title>
    <link rel="manifest" href="manifest-adm-ejc.json">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw-ejc.js');
      }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1e293b; --accent: #2563eb; --danger: #ef4444; --bg: #f8fafc; --success: #16a34a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 900px; margin: auto; }
        .stats { background: var(--primary); color: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .stats h2 { margin: 0; font-size: 1.8rem; }
        .bairro-menu { display: flex; overflow-x: auto; gap: 10px; padding: 10px 0; margin-bottom: 20px; scrollbar-width: none; }
        .bairro-item { background: white; padding: 10px 20px; border-radius: 20px; white-space: nowrap; cursor: pointer; border: 1px solid #e2e8f0; font-weight: 600; color: #64748b; }
        .bairro-item.active { background: var(--accent); color: white; }
        .lista-jovens { display: grid; gap: 12px; }
        .card-jovem { background: white; padding: 12px; border-radius: 18px; display: flex; align-items: center; gap: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .foto-perfil-card { width: 55px; height: 55px; border-radius: 15px; object-fit: cover; background: #e2e8f0; }
        .info-principal { flex-grow: 1; }
        .info-principal h3 { margin: 0; font-size: 1rem; color: var(--primary); text-transform: uppercase; }
        .acoes { display: flex; gap: 8px; }
        .btn-acao { border: none; width: 45px; height: 45px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
        .btn-pdf { background: #fee2e2; color: var(--danger); }
        .btn-whatsapp { background: #dcfce7; color: var(--success); }
        .btn-relatorio { background: var(--accent); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 25px; }
    </style>
</head>
<body>

<div class="container">
    <div class="stats">
        <div><small>Total de Inscritos</small><h2 id="totalGeral">0</h2></div>
        <img src="ejcmaracanau.jpeg" style="width: 60px; height: 60px; border-radius: 50%;">
    </div>
    <div id="bairrosMenu" class="bairro-menu"></div>
    <div id="lista" class="lista-jovens"></div>
    <button class="btn-relatorio" onclick="gerarRelatorioGeral()"><i class="fas fa-file-export"></i> RELATÓRIO GERAL (PDF)</button>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzo_A9kOeOpWkYXWREznU7zPE9UDQVLah2fI5CLv_Yl-aRCiZkegTnw8uRa6fTb78ny/exec";
    let todosDados = [];
    const FOTO_SEM_PERFIL = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=";

    async function carregarDados() {
        try {
            const response = await fetch(SCRIPT_URL);
            todosDados = await response.json();
            document.getElementById('totalGeral').innerText = todosDados.length;
            configurarFiltros();
            renderizarLista(todosDados);
        } catch (e) { alert("Erro ao carregar dados."); }
    }

    function configurarFiltros() {
        const bairros = ['TODOS', ...new Set(todosDados.map(item => item.Bairro).filter(b => b))].sort();
        const menu = document.getElementById('bairrosMenu');
        menu.innerHTML = '';
        bairros.forEach(b => {
            const div = document.createElement('div');
            div.className = `bairro-item ${b === 'TODOS' ? 'active' : ''}`;
            div.innerText = b.toUpperCase();
            div.onclick = () => filtrar(b, div);
            menu.appendChild(div);
        });
    }

    function filtrar(bairro, elemento) {
        document.querySelectorAll('.bairro-item').forEach(i => i.classList.remove('active'));
        elemento.classList.add('active');
        renderizarLista(bairro === 'TODOS' ? todosDados : todosDados.filter(i => i.Bairro === bairro));
    }

    function renderizarLista(dados) {
        const lista = document.getElementById('lista');
        lista.innerHTML = '';
        dados.forEach(p => {
            const fotoUrl = p["foto (link)"] || p.foto || FOTO_SEM_PERFIL;
            const card = document.createElement('div');
            card.className = 'card-jovem';
            card.innerHTML = `
                <img src="${fotoUrl.length > 50 ? fotoUrl : FOTO_SEM_PERFIL}" class="foto-perfil-card">
                <div class="info-principal"><h3>${p.Nome}</h3><p>${p.Bairro}</p></div>
                <div class="acoes">
                    <button class="btn-acao btn-whatsapp" onclick="window.open('https://wa.me/55${p.whatsapp.replace(/\D/g,'')}')"><i class="fab fa-whatsapp"></i></button>
                    <button class="btn-acao btn-pdf" onclick='gerarPDF(${JSON.stringify(p)})'><i class="fas fa-file-pdf"></i></button>
                </div>`;
            lista.appendChild(card);
        });
    }

    function gerarPDF(p) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFillColor(30, 41, 59); doc.rect(0, 0, 210, 35, 'F');
        doc.setTextColor(255, 255, 255); doc.setFontSize(18); doc.text("FICHA EJC 2026", 105, 22, { align: 'center' });
        const foto = p["foto (link)"] || p.foto;
        if(foto && foto.length > 50) { try { doc.addImage(foto, 'JPEG', 150, 45, 40, 50); } catch(e) {} }
        doc.setTextColor(0); doc.setFontSize(12);
        let y = 55;
        [["NOME:", p.Nome], ["CPF:", p.CPF], ["NASCIMENTO:", p.Idade], ["WHATSAPP:", p.whatsapp], ["BAIRRO:", p.Bairro], ["RUA:", p.Rua]].forEach(c => {
            doc.setFont(undefined, 'bold'); doc.text(c[0], 20, y);
            doc.setFont(undefined, 'normal'); doc.text(String(c[1] || ""), 60, y);
            y += 12;
        });
        doc.save(`Ficha_${p.Nome}.pdf`);
    }

    function gerarRelatorioGeral() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', 'a4');
        doc.text("RELATÓRIO GERAL - EJC 2026", 14, 15);
        doc.autoTable({ head: [['Nome', 'CPF', 'WhatsApp', 'Bairro']], body: todosDados.map(p => [p.Nome, p.CPF, p.whatsapp, p.Bairro]), startY: 25 });
        doc.save("Relatorio_EJC.pdf");
    }
    carregarDados();
</script>
</body>
</html>
