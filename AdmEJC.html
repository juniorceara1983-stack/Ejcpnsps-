<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM EJC - PNSPS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1e293b; --accent: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 900px; margin: auto; }
        .btn { border: none; border-radius: 12px; padding: 15px; font-weight: bold; cursor: pointer; display: block; width: 100%; text-decoration: none; text-align: center; margin-bottom: 15px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: #22c55e; color: white; }
        .btn-photo { background: #f59e0b; color: white; margin-top: 10px; font-size: 0.8rem; padding: 10px; }
        .card-jovem { background: white; padding: 20px; border-radius: 16px; margin-bottom: 12px; border: 1px solid #f1f5f9; }
        #loginPage { max-width: 350px; margin: 100px auto; background: white; padding: 40px; border-radius: 24px; text-align: center; }
        input { width: 100%; padding: 14px; margin: 15px 0; border: 1.5px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; }
        .modal-foto { display:none; position:fixed; z-index:2000; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); align-items:center; justify-content:center; flex-direction: column; }
        .modal-foto img { max-width: 90%; max-height: 80%; border-radius: 8px; border: 4px solid white; }
    </style>
</head>
<body>

    <div id="loginPage">
        <img src="1774975668180.png" style="width:80px; border-radius:50%; margin-bottom:15px;">
        <h2>EJC ADM</h2>
        <input type="password" id="senha" placeholder="Senha do Painel">
        <button class="btn btn-primary" onclick="logar()">ENTRAR</button>
    </div>

    <div id="dashPage" style="display:none;" class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
            <h1>Inscritos 2026</h1>
            <button onclick="carregarDados()" style="background:none; border:none; cursor:pointer; color:var(--accent)"><i class="fas fa-sync-alt fa-2x"></i></button>
        </div>
        <button class="btn btn-primary" onclick="gerarRelatorioGeral()">BAIXAR RELATÓRIO PDF</button>
        <button class="btn btn-success" onclick="compartilharZap()">NOTIFICAR EQUIPE (ZAP)</button>
        <div id="listaContainer">Sincronizando...</div>
    </div>

    <div id="modalFoto" class="modal-foto" onclick="this.style.display='none'">
        <img id="imgExpandida" src="">
        <p style="color:white; margin-top:15px;">Toque para fechar</p>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzo_A9kOeOpWkYXWREznU7zPE9UDQVLah2fI5CLv_Yl-aRCiZkegTnw8uRa6fTb78ny/exec";
        let inscritos = [];

        function logar() {
            if(document.getElementById('senha').value === "ejc2026") {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('dashPage').style.display = 'block';
                carregarDados();
            } else { alert("Senha incorreta!"); }
        }

        async function carregarDados() {
            const container = document.getElementById('listaContainer');
            container.innerHTML = "Carregando dados...";
            try {
                const res = await fetch(SCRIPT_URL);
                inscritos = await res.json();
                renderizar();
            } catch (e) { container.innerHTML = "Erro ao carregar dados."; }
        }

        function renderizar() {
            const container = document.getElementById('listaContainer');
            container.innerHTML = "";
            inscritos.forEach(p => {
                // Ajuste exato aos nomes das colunas da sua planilha
                const nome = p.Nome || "SEM NOME";
                const cpf = p.CPF || "---";
                const bairro = p.Bairro || "---";
                const foto = p['Foto (link)'];

                let botaoFoto = (foto && foto.includes('base64')) 
                    ? `<button class="btn btn-photo" onclick="verFoto('${p.row}')"><i class="fas fa-camera"></i> VER FOTO</button>` 
                    : `<span style="font-size:0.7rem; color:#94a3b8;">(Sem foto na planilha)</span>`;

                container.innerHTML += `
                    <div class="card-jovem">
                        <b style="text-transform:uppercase;">${nome}</b>
                        <p style="font-size:0.85rem; color:#64748b; margin:5px 0;">CPF: ${cpf} | Bairro: ${bairro}</p>
                        <div style="display:flex; gap:10px; margin-top:10px; border-top:1px solid #f1f5f9; padding-top:10px;">
                             <button class="btn btn-primary" style="font-size:0.75rem; padding:8px; flex:1;" onclick="gerarFicha(${p.row})">BAIXAR FICHA</button>
                             <div style="flex:1; text-align:center">${botaoFoto}</div>
                        </div>
                    </div>`;
            });
        }

        function verFoto(linha) {
            const p = inscritos.find(i => i.row == linha);
            if(p && p['Foto (link)']) {
                document.getElementById('imgExpandida').src = p['Foto (link)'];
                document.getElementById('modalFoto').style.display = 'flex';
            }
        }

        function gerarRelatorioGeral() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            doc.text("RELATÓRIO GERAL EJC 2026", 14, 15);
            const cabecalho = [["NOME", "CPF", "IDADE", "WHATSAPP", "RUA", "BAIRRO", "CIDADE"]];
            const linhas = inscritos.map(p => [p.Nome, p.CPF, p.Idade, p.whatsapp, p.Rua, p.Bairro, p.Cidade]);
            doc.autoTable({ head: cabecalho, body: linhas, startY: 25 });
            doc.save("Relatorio_Geral_EJC.pdf");
        }

        function gerarFicha(linha) {
            const p = inscritos.find(i => i.row == linha);
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(16);
            doc.text("FICHA DE INSCRIÇÃO INDIVIDUAL", 105, 20, {align: 'center'});
            doc.setFontSize(12);
            doc.text("Nome: " + (p.Nome || ""), 20, 40);
            doc.text("CPF: " + (p.CPF || ""), 20, 50);
            doc.text("Whatsapp: " + (p.whatsapp || ""), 20, 60);
            doc.text("Bairro: " + (p.Bairro || ""), 20, 70);
            doc.save(`Ficha_${p.Nome}.pdf`);
        }

        function compartilharZap() {
            const msg = window.encodeURIComponent("Olá! A lista de inscritos do EJC foi atualizada. Verifique o painel.");
            window.open(`https://api.whatsapp.com/send?text=${msg}`);
        }
    </script>
</body>
</html>
