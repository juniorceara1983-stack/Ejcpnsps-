<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM EJC - PNSPS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1e293b; --accent: #2563eb; --danger: #ef4444; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 900px; margin: auto; }
        .btn { border: none; border-radius: 12px; padding: 16px; font-weight: bold; cursor: pointer; display: block; width: 100%; text-align: center; text-decoration: none; margin-bottom: 15px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-photo { background: #f59e0b; color: white; padding: 10px; border-radius: 8px; font-size: 0.75rem; }
        .btn-delete { background: #fee2e2; color: var(--danger); padding: 10px; border-radius: 8px; font-size: 0.9rem; width: 45px; margin: 0; }
        .card-jovem { background: white; padding: 20px; border-radius: 16px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border: 1px solid #f1f5f9; }
        #loginPage { max-width: 350px; margin: 100px auto; background: white; padding: 40px; border-radius: 24px; text-align: center; }
        input { width: 100%; padding: 14px; margin: 15px 0; border: 1.5px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; }
        .modal-foto { display:none; position:fixed; z-index:2000; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); align-items:center; justify-content:center; flex-direction: column; }
        .modal-foto img { max-width: 90%; max-height: 80%; border: 4px solid white; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="loginPage">
        <img src="1774975668180.png" style="width:80px; border-radius:50%; margin-bottom:15px;">
        <h2>EJC ADM</h2>
        <input type="password" id="senha" placeholder="Senha">
        <button class="btn btn-primary" onclick="logar()">ENTRAR</button>
    </div>

    <div id="dashPage" style="display:none;" class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
            <h1 style="font-size:1.5rem;">Inscritos 2026</h1>
            <button onclick="carregarDados()" style="background:none; border:none; cursor:pointer; color:var(--accent)"><i class="fas fa-sync-alt fa-2x"></i></button>
        </div>
        <button class="btn btn-primary" onclick="gerarRelatorioGeral()">BAIXAR RELATÓRIO GERAL</button>
        <div id="listaContainer">Sincronizando...</div>
    </div>

    <div id="modalFoto" class="modal-foto" onclick="this.style.display='none'">
        <img id="imgExpandida" src="">
        <p style="color:white; margin-top:15px;">Toque para fechar</p>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzo_A9kOeOpWkYXWREznU7zPE9UDQVLah2fI5CLv_Yl-aRCiZkegTnw8uRa6fTb78ny/exec";
        const FOTO_SEM_PERFIL = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAJYAAACOAQMAAAC2d5YjAAAAA1BMVEXm5uY2W5X3AAAAG0lEQVRIiWNgGAWjYBSMglEwCkbBKBgF9AMAAAYAAZtUq70AAAAASUVORK5CYII=";
        let inscritos = [];

        function logar() {
            if(document.getElementById('senha').value === "ejc2026") {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('dashPage').style.display = 'block';
                carregarDados();
            } else { alert("Senha incorreta!"); }
        }

        async function carregarDados() {
            const container = document.getElementById('listaContainer');
            container.innerHTML = "Atualizando...";
            try {
                const res = await fetch(SCRIPT_URL);
                inscritos = await res.json();
                renderizar();
            } catch (e) { container.innerHTML = "Erro ao carregar dados."; }
        }

        function obter(obj, chave) {
            const chavesDisponiveis = Object.keys(obj);
            const chaveEncontrada = chavesDisponiveis.find(k => k.toLowerCase().trim() === chave.toLowerCase().trim());
            return chaveEncontrada ? obj[chaveEncontrada] : "---";
        }

        // --- FUNÇÃO PARA CALCULAR IDADE ---
        function formatarIdadeCompleta(dataNasc) {
            if (!dataNasc || dataNasc === "---") return "---";
            const hoje = new Date();
            const nascimento = new Date(dataNasc);
            
            if (isNaN(nascimento)) return dataNasc; // Se não for data válida, retorna o texto original

            let idade = hoje.getFullYear() - nascimento.getFullYear();
            const m = hoje.getMonth() - nascimento.getMonth();
            if (m < 0 || (m === 0 && hoje.getDate() < nascimento.getDate())) {
                idade--;
            }

            // Formata a data para padrão BR (DD/MM/AAAA)
            const dia = String(nascimento.getDate()).padStart(2, '0');
            const mes = String(nascimento.getMonth() + 1).padStart(2, '0');
            const ano = nascimento.getFullYear();

            return `${idade} anos (${dia}/${mes}/${ano})`;
        }

        function validarFoto(p) {
            const fotoLink = obter(p, 'foto (link)');
            return (fotoLink && fotoLink.length > 50) ? fotoLink : FOTO_SEM_PERFIL;
        }

        function renderizar() {
            const container = document.getElementById('listaContainer');
            if (inscritos.length === 0) {
                container.innerHTML = "<p style='text-align:center; color:#94a3b8;'>Nenhuma inscrição encontrada.</p>";
                return;
            }
            container.innerHTML = "";
            inscritos.forEach(p => {
                const foto = validarFoto(p);
                const infoIdade = formatarIdadeCompleta(obter(p, 'Idade'));

                let botaoFoto = (foto === FOTO_SEM_PERFIL) 
                    ? `<span style="font-size:0.7rem; color:#94a3b8;">(SEM FOTO)</span>` 
                    : `<button class="btn btn-photo" onclick="verFoto('${p.row}')"><i class="fas fa-camera"></i> VER FOTO</button>`;

                container.innerHTML += `
                    <div class="card-jovem">
                        <div style="display:flex; justify-content:space-between; align-items:start;">
                            <div>
                                <b style="text-transform:uppercase;">${obter(p, 'Nome')}</b>
                                <p style="font-size:0.85rem; color:#64748b; margin:5px 0;">CPF: ${obter(p, 'CPF')} | Bairro: ${obter(p, 'Bairro')}</p>
                                <p style="font-size:0.8rem; color:var(--accent); font-weight:600;">${infoIdade}</p>
                            </div>
                            <button class="btn btn-delete" onclick="deletarRegistro(${p.row})"><i class="fas fa-trash-alt"></i></button>
                        </div>
                        <div style="display:flex; gap:10px; margin-top:10px; align-items:center;">
                            <button class="btn btn-primary" style="margin:0; padding:10px; flex:1; font-size:0.75rem;" onclick="gerarFicha(${p.row})">BAIXAR FICHA PDF</button>
                            <div style="flex:1; text-align:center;">${botaoFoto}</div>
                        </div>
                    </div>`;
            });
        }

        function verFoto(linha) {
            const p = inscritos.find(i => i.row == linha);
            document.getElementById('imgExpandida').src = validarFoto(p);
            document.getElementById('modalFoto').style.display = 'flex';
        }

        async function deletarRegistro(linha) {
            if(!confirm("Tem certeza que deseja apagar?")) return;
            await fetch(SCRIPT_URL, {method:'POST', mode:'no-cors', body:JSON.stringify({action:"delete", row:linha})});
            carregarDados();
        }

        function gerarFicha(linha) {
            const p = inscritos.find(i => i.row == linha);
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFontSize(18);
            doc.text("FICHA INDIVIDUAL - EJC 2026", 105, 20, { align: "center" });
            
            const foto = validarFoto(p);
            if(foto === FOTO_SEM_PERFIL) {
                doc.setFillColor(230, 230, 230);
                doc.rect(150, 35, 40, 50, 'F');
                doc.setFontSize(10);
                doc.text("SEM FOTO", 170, 60, { align: "center" });
            } else {
                doc.addImage(foto, 'JPEG', 150, 35, 40, 50);
            }

            doc.setFontSize(12);
            doc.setFont(undefined, 'bold');
            const campos = [
                ["NOME:", obter(p, 'Nome')],
                ["CPF:", obter(p, 'CPF')],
                ["IDADE:", formatarIdadeCompleta(obter(p, 'Idade'))],
                ["WHATSAPP:", obter(p, 'whatsapp')],
                ["RUA:", obter(p, 'Rua')],
                ["BAIRRO:", obter(p, 'Bairro')],
                ["CIDADE:", obter(p, 'Cidade')]
            ];

            let y = 45;
            campos.forEach(campo => {
                doc.text(campo[0], 20, y);
                doc.setFont(undefined, 'normal');
                doc.text(String(campo[1]), 65, y);
                doc.setFont(undefined, 'bold');
                y += 12;
            });

            doc.save(`Ficha_${obter(p, 'Nome')}.pdf`);
        }

        function gerarRelatorioGeral() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            doc.text("RELATÓRIO GERAL EJC 2026", 14, 15);
            const linhas = inscritos.map(p => [
                obter(p, 'Nome'), 
                obter(p, 'CPF'), 
                formatarIdadeCompleta(obter(p, 'Idade')), 
                obter(p, 'whatsapp'), 
                obter(p, 'Bairro')
            ]);
            doc.autoTable({ 
                head: [["NOME", "CPF", "IDADE (NASC)", "ZAP", "BAIRRO"]], 
                body: linhas, 
                startY: 25,
                theme: 'striped',
                headStyles: { fillColor: [30, 41, 59] }
            });
            doc.save("Relatorio_Geral.pdf");
        }
    </script>
</body>
</html>
