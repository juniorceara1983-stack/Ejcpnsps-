<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM EJC - PNSPS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1e293b; --accent: #2563eb; --danger: #ef4444; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 900px; margin: auto; }
        .btn { border: none; border-radius: 12px; padding: 16px; font-weight: bold; cursor: pointer; display: block; width: 100%; text-align: center; text-decoration: none; margin-bottom: 15px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-photo { background: #f59e0b; color: white; padding: 10px; border-radius: 8px; font-size: 0.75rem; }
        .btn-delete { background: #fee2e2; color: var(--danger); padding: 10px; border-radius: 8px; font-size: 0.9rem; width: 45px; margin: 0; }
        .card-jovem { background: white; padding: 20px; border-radius: 16px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border: 1px solid #f1f5f9; }
        #loginPage { max-width: 350px; margin: 100px auto; background: white; padding: 40px; border-radius: 24px; text-align: center; }
        input { width: 100%; padding: 14px; margin: 15px 0; border: 1.5px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; }
        .modal-foto { display:none; position:fixed; z-index:2000; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); align-items:center; justify-content:center; flex-direction: column; }
        .modal-foto img { max-width: 90%; max-height: 80%; border: 4px solid white; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="loginPage">
        <img src="1774975668180.png" style="width:80px; border-radius:50%; margin-bottom:15px;">
        <h2>EJC ADM</h2>
        <input type="password" id="senha" placeholder="Senha">
        <button class="btn btn-primary" onclick="logar()">ENTRAR</button>
    </div>

    <div id="dashPage" style="display:none;" class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
            <h1 style="font-size:1.5rem;">Inscritos 2026</h1>
            <button onclick="carregarDados()" style="background:none; border:none; cursor:pointer; color:var(--accent)"><i class="fas fa-sync-alt fa-2x"></i></button>
        </div>
        <button class="btn btn-primary" onclick="gerarRelatorioGeral()">BAIXAR RELATÓRIO PDF</button>
        <div id="listaContainer">Sincronizando...</div>
    </div>

    <div id="modalFoto" class="modal-foto" onclick="this.style.display='none'">
        <img id="imgExpandida" src="">
        <p style="color:white; margin-top:15px;">Toque para fechar</p>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzo_A9kOeOpWkYXWREznU7zPE9UDQVLah2fI5CLv_Yl-aRCiZkegTnw8uRa6fTb78ny/exec";
        let inscritos = [];

        function logar() {
            if(document.getElementById('senha').value === "ejc2026") {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('dashPage').style.display = 'block';
                carregarDados();
            } else { alert("Senha incorreta!"); }
        }

        async function carregarDados() {
            const container = document.getElementById('listaContainer');
            container.innerHTML = "Atualizando...";
            try {
                const res = await fetch(SCRIPT_URL);
                inscritos = await res.json();
                renderizar();
            } catch (e) { container.innerHTML = "Erro."; }
        }

        function obter(obj, chave) {
            // Busca simplificada: pega o valor exato ou tenta minúscula
            return obj[chave] || obj[chave.toLowerCase()] || "---";
        }

        function renderizar() {
            const container = document.getElementById('listaContainer');
            container.innerHTML = "";
            inscritos.forEach(p => {
                const foto = obter(p, 'foto');
                let botaoFoto = (foto && foto.length > 100) 
                    ? `<button class="btn btn-photo" onclick="verFoto('${p.row}')"><i class="fas fa-camera"></i> VER FOTO</button>` 
                    : `<span style="font-size:0.7rem; color:#94a3b8;">(Sem foto)</span>`;

                container.innerHTML += `
                    <div class="card-jovem">
                        <div style="display:flex; justify-content:space-between; align-items:start;">
                            <div>
                                <b style="text-transform:uppercase;">${obter(p, 'Nome')}</b>
                                <p style="font-size:0.85rem; color:#64748b; margin:5px 0;">CPF: ${obter(p, 'CPF')} | Bairro: ${obter(p, 'Bairro')}</p>
                            </div>
                            <button class="btn btn-delete" onclick="deletarRegistro(${p.row})"><i class="fas fa-trash-alt"></i></button>
                        </div>
                        <div style="display:flex; gap:10px; margin-top:10px; align-items:center;">
                            <button class="btn btn-primary" style="margin:0; padding:10px; flex:1; font-size:0.75rem;" onclick="gerarFicha(${p.row})">BAIXAR FICHA</button>
                            <div style="flex:1; text-align:center;">${botaoFoto}</div>
                        </div>
                    </div>`;
            });
        }

        async function deletarRegistro(linha) {
            if(!confirm("Tem certeza que deseja apagar?")) return;
            await fetch(SCRIPT_URL, {method:'POST', mode:'no-cors', body:JSON.stringify({action:"delete", row:linha})});
            carregarDados();
        }

        function verFoto(linha) {
            const p = inscritos.find(i => i.row == linha);
            document.getElementById('imgExpandida').src = obter(p, 'foto');
            document.getElementById('modalFoto').style.display = 'flex';
        }

        function gerarFicha(linha) {
            const p = inscritos.find(i => i.row == linha);
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("FICHA EJC 2026", 20, 20);
            const foto = obter(p, 'foto');
            if(foto && foto.length > 100) doc.addImage(foto, 'JPEG', 150, 30, 35, 45);
            doc.text("NOME: " + obter(p, 'Nome'), 20, 40);
            doc.text("CPF: " + obter(p, 'CPF'), 20, 50);
            doc.text("BAIRRO: " + obter(p, 'Bairro'), 20, 60);
            doc.save(`Ficha_${obter(p, 'Nome')}.pdf`);
        }

        function gerarRelatorioGeral() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            doc.text("RELATÓRIO", 14, 15);
            const linhas = inscritos.map(p => [obter(p, 'Nome'), obter(p, 'CPF'), obter(p, 'whatsapp'), obter(p, 'Bairro')]);
            doc.autoTable({ head: [["NOME", "CPF", "ZAP", "BAIRRO"]], body: linhas, startY: 25 });
            doc.save("Relatorio.pdf");
        }
    </script>
</body>
</html>
