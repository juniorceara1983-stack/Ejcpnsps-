<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM EJC - Painel Completo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .dashboard { max-width: 800px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 16px; margin-bottom: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn { border: none; border-radius: 10px; padding: 14px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-bottom: 10px; width: 100%; display: block; text-align: center; text-decoration: none; }
        .btn-pdf { background: var(--primary); color: white; }
        .btn-zap { background: #22c55e; color: white; }
        .btn-del { background: #fee2e2; color: #ef4444; width: 45px; margin: 0; }
        #loginPage { max-width: 380px; margin: 100px auto; background: white; padding: 40px; border-radius: 24px; text-align: center; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1.5px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="loginPage">
        <img src="1774975668180.png" style="width:100px; border-radius:50%; border:4px solid #f1f5f9; margin-bottom:20px;">
        <h2>Acesso ADM</h2>
        <input type="password" id="senha" placeholder="Digite a senha">
        <button class="btn btn-pdf" onclick="logar()">ENTRAR</button>
    </div>

    <div id="dashPage" style="display:none;" class="dashboard">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2 style="color:#1e293b">Gestão EJC 2026</h2>
            <img src="1774975668180.png" style="width:50px; border-radius:50%">
        </div>

        <button class="btn btn-pdf" onclick="gerarPdfCompleto()">
            <i class="fas fa-file-download"></i> BAIXAR RELATÓRIO COMPLETO (TODOS DADOS)
        </button>

        <button class="btn btn-zap" onclick="enviarZap()">
            <i class="fab fa-whatsapp"></i> ENVIAR LISTA PELO WHATSAPP
        </button>

        <div id="lista">Carregando...</div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzo_A9kOeOpWkYXWREznU7zPE9UDQVLah2fI5CLv_Yl-aRCiZkegTnw8uRa6fTb78ny/exec";
        let inscritos = [];

        function logar() {
            if(document.getElementById('senha').value === "ejc2026") {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('dashPage').style.display = 'block';
                carregar();
            } else { alert("Senha incorreta!"); }
        }

        async function carregar() {
            const res = await fetch(SCRIPT_URL);
            inscritos = await res.json();
            render();
        }

        function render() {
            const div = document.getElementById('lista');
            div.innerHTML = "";
            inscritos.forEach(p => {
                div.innerHTML += `
                    <div class="card">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div>
                                <b style="font-size:1.1rem; text-transform:uppercase;">${p.nome}</b>
                                <div style="color:#64748b; font-size:0.85rem; margin-top:5px;">
                                    <span>CPF: ${p.cpf}</span> | <span>${p.bairro}</span>
                                </div>
                            </div>
                            <button class="btn btn-del" onclick="deletar(${p.row})"><i class="fas fa-trash"></i></button>
                        </div>
                        <button class="btn btn-pdf" style="margin-top:15px; font-size:0.8rem; padding:8px;" onclick="pdfIndividual(${p.row})">BAIXAR FICHA INDIVIDUAL</button>
                    </div>`;
            });
        }

        function gerarPdfCompleto() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            doc.setFontSize(16);
            doc.text("RELATÓRIO GERAL DE INSCRITOS - EJC 2026", 14, 15);
            
            const cols = ["NOME", "CPF", "NASCIMENTO", "ZAP", "RUA/Nº", "BAIRRO", "CIDADE"];
            const rows = inscritos.map(p => [p.nome, p.cpf, p.nascimento, p.telefone, p.rua, p.bairro, p.cidade]);

            doc.autoTable({ head: [cols], body: rows, startY: 25, theme: 'grid', headStyles: {fillColor: [37, 99, 235]} });
            doc.save("Relatorio_EJC_Completo.pdf");
        }

        function pdfIndividual(linha) {
            const p = inscritos.find(i => i.row == linha);
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFillColor(37, 99, 235);
            doc.rect(0, 0, 210, 40, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(22);
            doc.text("FICHA EJC 2026", 20, 25);

            doc.setTextColor(0);
            doc.setFontSize(12);
            let y = 60;
            const info = [
                ["NOME COMPLETO:", p.nome.toUpperCase()],
                ["CPF:", p.cpf],
                ["DATA NASCIMENTO:", p.nascimento],
                ["WHATSAPP:", p.telefone],
                ["ENDEREÇO:", p.rua],
                ["BAIRRO:", p.bairro],
                ["CIDADE:", p.cidade]
            ];

            info.forEach(item => {
                doc.setFont("helvetica", "bold"); doc.text(item[0], 20, y);
                doc.setFont("helvetica", "normal"); doc.text(String(item[1]), 75, y);
                y += 12;
            });

            doc.save(`Ficha_${p.nome}.pdf`);
        }

        function enviarZap() {
            gerarPdfCompleto();
            const msg = window.encodeURIComponent("Olá! Acabei de gerar a lista completa de inscritos do EJC 2026. Segue o relatório detalhado em anexo.");
            setTimeout(() => {
                window.open(`https://api.whatsapp.com/send?text=${msg}`);
            }, 1500);
        }

        async function deletar(linha) {
            if(!confirm("Excluir este inscrito permanentemente?")) return;
            fetch(SCRIPT_URL, {method:'POST', mode:'no-cors', body: JSON.stringify({action:"delete", row:linha})});
            alert("Excluído!"); carregar();
        }
    </script>
</body>
</html>
