<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM EJC - Painel</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #f8fafc; padding: 15px; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn { padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; }
        .btn-pdf { background: #2563eb; color: white; }
        .btn-del { background: #fee2e2; color: #ef4444; width: 40px; }
    </style>
</head>
<body>
    <div style="max-width: 500px; margin: auto;">
        <h2>Inscritos 2026</h2>
        <button class="btn btn-pdf" onclick="baixarPDFGeral()" style="margin-bottom: 20px;">
            <i class="fas fa-file-pdf"></i> BAIXAR PDF COMPLETO (TODOS)
        </button>
        <div id="lista">Carregando...</div>
    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbzo_A9kOeOpWkYXWREznU7zPE9UDQVLah2fI5CLv_Yl-aRCiZkegTnw8uRa6fTb78ny/exec";
        let inscritos = [];

        async function carregar() {
            const res = await fetch(URL);
            inscritos = await res.json();
            const div = document.getElementById('lista');
            div.innerHTML = "";
            inscritos.forEach(p => {
                div.innerHTML += `
                    <div class="card">
                        <div style="display:flex; justify-content: space-between;">
                            <b>${p.nome}</b>
                            <button class="btn-del" onclick="deletar(${p.row})"><i class="fas fa-trash"></i></button>
                        </div>
                        <p style="font-size:0.8rem; color:#666">CPF: ${p.cpf}</p>
                        <button class="btn btn-pdf" onclick="baixarIndividual(${p.row})" style="font-size:0.7rem;">BAIXAR FICHA</button>
                    </div>`;
            });
        }

        function baixarPDFGeral() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('landscape');
            doc.text("RELATÓRIO COMPLETO EJC 2026", 14, 15);
            
            // Puxa TODOS os dados da planilha
            const colunas = ["Nome", "CPF", "Nasc.", "WhatsApp", "Bairro", "Cidade"];
            const linhas = inscritos.map(p => [p.nome, p.cpf, p.nascimento, p.whatsapp, p.bairro, p.cidade]);

            doc.autoTable({ head: [colunas], body: linhas, startY: 25 });
            doc.save("Relatorio_Completo_EJC.pdf");
        }

        async function deletar(linha) {
            if(!confirm("Excluir?")) return;
            fetch(URL, {method:'POST', mode:'no-cors', body: JSON.stringify({action:"delete", row:linha})});
            alert("Excluído!"); carregar();
        }

        window.onload = carregar;
    </script>
</body>
</html>
