<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJC - Inscrição</title>
    <style>
        :root { --pnsps-light: #e6e0f3; --ejc-blue: #2563eb; --text: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; margin: 0; padding: 15px; color: var(--text); }
        .container { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); border-top: 10px solid var(--pnsps-light); }
        .header { text-align: center; margin-bottom: 25px; }
        .logo { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--pnsps-light); margin-bottom: 10px; }
        h1 { font-size: 1.3rem; color: var(--ejc-blue); margin: 5px 0; }
        label { display: block; margin-top: 15px; font-weight: 600; font-size: 0.85rem; color: #64748b; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1.5px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; font-size: 1rem; }
        .photo-upload { background: var(--pnsps-light); border: 2px dashed #94a3b8; padding: 20px; text-align: center; border-radius: 15px; cursor: pointer; margin-top: 10px; }
        #preview { width: 100%; max-height: 200px; border-radius: 10px; margin-top: 10px; object-fit: contain; display: none; }
        .btn-enviar { width: 100%; padding: 16px; background: var(--ejc-blue); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 1rem; margin-top: 25px; cursor: pointer; }
        .loading { display: none; color: var(--ejc-blue); font-weight: bold; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="1774975668180.png" alt="Logo EJC" class="logo">
            <h1>PRÉ-FICHA EJC</h1>
            <p style="font-size: 0.8rem; color: #94a3b8;">PNSPS - Maracanaú</p>
        </div>

        <form id="formEJC">
            <label>Nome Completo</label>
            <input type="text" id="nome" required>

            <label>CPF (Apenas números)</label>
            <input type="number" id="cpf" required>

            <label>Foto (Galeria)</label>
            <div class="photo-upload" onclick="document.getElementById('inputFoto').click()">
                <span id="txtFoto">🖼️ Selecionar Foto</span>
                <input type="file" id="inputFoto" accept="image/*" style="display:none" onchange="previewImage(this)">
                <img id="preview">
            </div>

            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;"> 
                    <label>Data Nasc.</label> 
                    <input type="date" id="nascimento" required> 
                </div>
                <div style="flex: 1;"> 
                    <label>WhatsApp</label> 
                    <input type="tel" id="telefone" placeholder="(85) 9..." required> 
                </div>
            </div>

            <label>Bairro</label>
            <input type="text" id="bairro" required>

            <label>Cidade</label>
            <input type="text" id="cidade" value="Maracanaú" required>

            <button type="button" class="btn-enviar" id="btnAcao" onclick="enviarParaPlanilha()">ENVIAR INSCRIÇÃO</button>
            <div id="statusMsg" class="loading">Enviando dados... Aguarde.</div>
        </form>
    </div>

    <script>
        let fotoBase64 = "";

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('preview').src = e.target.result;
                    document.getElementById('preview').style.display = 'block';
                    document.getElementById('txtFoto').innerText = "Foto Selecionada ✅";
                    fotoBase64 = e.target.result;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function enviarParaPlanilha() {
            const btn = document.getElementById('btnAcao');
            const status = document.getElementById('statusMsg');
            
            const dados = {
                nome: document.getElementById('nome').value,
                cpf: document.getElementById('cpf').value,
                telefone: document.getElementById('telefone').value,
                nascimento: document.getElementById('nascimento').value,
                bairro: document.getElementById('bairro').value,
                cidade: document.getElementById('cidade').value,
                foto: fotoBase64 ? "Foto enviada" : "Sem foto"
            };

            if(!dados.cpf || !dados.nome) return alert("Preencha Nome e CPF!");

            btn.disabled = true;
            btn.style.background = "#94a3b8";
            status.style.display = "block";

            try {
                // LINK ATUALIZADO (VERSÃO 2)
                const url = "https://script.google.com/macros/s/AKfycbwmFWKWZycXDm14ufINZ8mOhsZKLMmEUE0AD10AD71oi28APVqyps1gzsvKARBBRAQ/exec";
                
                await fetch(url, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });

                alert("Inscrição de " + dados.nome + " enviada com sucesso!");
                document.getElementById('formEJC').reset();
                document.getElementById('preview').style.display = 'none';
                document.getElementById('txtFoto').innerText = "🖼️ Selecionar Foto";
            } catch (error) {
                alert("Erro ao enviar. Tente novamente.");
            } finally {
                btn.disabled = false;
                btn.style.background = "#2563eb";
                status.style.display = "none";
            }
        }
    </script>
</body>
</html>
