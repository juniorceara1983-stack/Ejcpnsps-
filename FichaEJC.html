<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJC - Inscrição 2026</title>
    <style>
        :root { --pnsps: #e6e0f3; --ejc: #2563eb; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; padding: 20px; }
        .container { max-width: 450px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); border-top: 10px solid var(--ejc); }
        label { display: block; margin-top: 15px; font-weight: 600; font-size: 0.85rem; color: #64748b; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1.5px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; }
        .photo-box { background: var(--pnsps); border: 2px dashed var(--ejc); padding: 20px; text-align: center; border-radius: 15px; cursor: pointer; margin-top: 10px; }
        #preview { width: 120px; height: 160px; border-radius: 8px; margin-top: 10px; display: none; object-fit: cover; border: 2px solid white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-enviar { width: 100%; padding: 16px; background: var(--ejc); color: white; border: none; border-radius: 12px; font-weight: bold; margin-top: 25px; cursor: pointer; }
        .modal { display: none; position: fixed; z-index: 1000; left:0; top:0; width:100%; height:100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 24px; width: 85%; max-width: 340px; text-align: center; }
        .modal-img { width: 130px; height: 130px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 4px solid var(--ejc); }
    </style>
</head>
<body>
    <div class="container">
        <div style="text-align: center; margin-bottom: 20px;">
            <img src="1774975668180.png" style="width: 80px; border-radius: 50%;">
            <h1 style="font-size:1.4rem; color:var(--ejc); margin:10px 0;">PRÉ-FICHA EJC 2026</h1>
        </div>

        <form id="formEJC">
            <label>Sua Foto (Estilo 3x4)</label>
            <div class="photo-box" onclick="document.getElementById('inputFoto').click()">
                <span id="txtFoto">📸 Clique para tirar ou escolher foto</span>
                <input type="file" id="inputFoto" accept="image/*" style="display:none" onchange="processarFoto(this)">
                <center><img id="preview"></center>
            </div>

            <label>Nome Completo</label>
            <input type="text" id="nome" required>
            <label>CPF (Apenas números)</label>
            <input type="number" id="cpf" required>

            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;"> <label>Data Nasc.</label> <input type="date" id="nascimento" required> </div>
                <div style="flex: 1;"> <label>WhatsApp</label> <input type="tel" id="telefone" required> </div>
            </div>

            <label>Rua e Número</label>
            <input type="text" id="rua">
            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;"> <label>Bairro</label> <input type="text" id="bairro" required> </div>
                <div style="flex: 1;"> <label>Cidade</label> <input type="text" id="cidade" value="Maracanaú" required> </div>
            </div>

            <button type="button" class="btn-enviar" id="btnAcao" onclick="enviar()">ENVIAR INSCRIÇÃO</button>
        </form>
    </div>

    <div id="meuModal" class="modal">
        <div class="modal-content">
            <img src="IMG_20260401_014539.jpg" class="modal-img">
            <p id="msgTexto" style="font-weight: 500; color: #1e293b; white-space: pre-line;"></p>
            <button class="btn-enviar" onclick="location.reload()">ENTENDIDO</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzo_A9kOeOpWkYXWREznU7zPE9UDQVLah2fI5CLv_Yl-aRCiZkegTnw8uRa6fTb78ny/exec";
        let fotoFinal = "";

        function processarFoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        // Força proporção 3x4 (ex: 300x400 pixels)
                        canvas.width = 300;
                        canvas.height = 400;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, 300, 400);
                        fotoFinal = canvas.toDataURL('image/jpeg', 0.7); // Comprime 70%
                        document.getElementById('preview').src = fotoFinal;
                        document.getElementById('preview').style.display = 'block';
                        document.getElementById('txtFoto').innerText = "Foto Ajustada ✅";
                    }
                    img.src = e.target.result;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function enviar() {
            const btn = document.getElementById('btnAcao');
            const cpf = document.getElementById('cpf').value;
            if(!cpf || !document.getElementById('nome').value) return alert("Preencha Nome e CPF!");
            
            btn.innerText = "ENVIANDO..."; btn.disabled = true;

            try {
                const res = await fetch(SCRIPT_URL);
                const lista = await res.json();
                if(lista.find(p => p.cpf == cpf)) {
                    mostrarModal("Olá tudo bem, esse CPF já tem um registro, por favor fale com a equipe dirigente");
                    return;
                }

                const d = document.getElementById('nascimento').value.split('-');
                const dados = {
                    nome: document.getElementById('nome').value,
                    cpf: cpf,
                    nascimento: `${d[2]}/${d[1]}/${d[0]}`,
                    telefone: document.getElementById('telefone').value,
                    rua: document.getElementById('rua').value,
                    bairro: document.getElementById('bairro').value,
                    cidade: document.getElementById('cidade').value,
                    foto: fotoFinal
                };

                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(dados) });
                mostrarModal("Olá eu sou o Padre Luciano, tudo bem?\nObg pela inscrição, aguarde o contato");
            } catch (e) { alert("Erro de conexão."); btn.disabled = false; }
        }

        function mostrarModal(txt) {
            document.getElementById('msgTexto').innerText = txt;
            document.getElementById('meuModal').style.display = 'flex';
        }
    </script>
</body>
</html>
