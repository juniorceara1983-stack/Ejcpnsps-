<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJC Maracanaú - Pré-Inscrição</title>
    <style>
        :root { --pnsps-purple-light: #e6e0f3; --ejc-blue: #2563eb; --pnsps-text: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; margin: 0; padding: 20px; color: var(--pnsps-text); }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border-top: 8px solid var(--pnsps-purple-light); }
        .header { text-align: center; margin-bottom: 25px; }
        .logo-ejc { width: 120px; height: auto; margin-bottom: 15px; border-radius: 50%; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: var(--ejc-blue); font-size: 1.5rem; margin: 10px 0; }
        label { display: block; margin-top: 15px; font-weight: 600; font-size: 0.9rem; }
        input, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; background: #fff; font-size: 1rem; }
        .photo-pwa { background: var(--pnsps-purple-light); border: 2px dashed #94a3b8; padding: 20px; text-align: center; border-radius: 10px; margin-top: 10px; cursor: pointer; }
        .btn-enviar { width: 100%; padding: 15px; background: var(--ejc-blue); color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 1.1rem; margin-top: 25px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="1774975668180.png" alt="EJC PNSPS Logo" class="logo-ejc">
            <h1>PRÉ-FICHA EJC</h1>
            <p style="font-size: 0.8rem; color: #64748b;">Paróquia Nossa Senhora da Penha e São Pedro</p>
        </div>

        <form id="formEJC">
            <label>Foto de Identificação</label>
            <div class="photo-pwa" onclick="document.getElementById('inputFoto').click()">
                <span id="txtFoto">📸 Clique para tirar ou anexar foto</span>
                <input type="file" id="inputFoto" accept="image/*" style="display:none" onchange="previewFoto(this)">
                <img id="preview" style="display:none; width: 100%; border-radius: 10px; margin-top: 10px;">
            </div>

            <label>Nome Completo</label>
            <input type="text" id="nome" required>

            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;"> <label>Idade</label> <input type="number" id="idade" required> </div>
                <div style="flex: 2;"> <label>Instagram</label> <input type="text" id="insta" placeholder="@"> </div>
            </div>

            <label>Endereço</label>
            <textarea id="endereco" rows="2"></textarea>

            <label>WhatsApp</label>
            <input type="tel" id="contato" placeholder="(85)">

            <label>Informações de Saúde / Alergias</label>
            <input type="text" id="saude">

            <button type="button" class="btn-enviar" onclick="enviarDados()">ENVIAR INSCRIÇÃO</button>
        </form>
    </div>

    <script>
        function previewFoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('preview').src = e.target.result;
                    document.getElementById('preview').style.display = 'block';
                    document.getElementById('txtFoto').innerText = "Foto pronta! ✅";
                }
                reader.readAsDataURL(input.files[0]);
            }
        }
        function enviarDados() { alert("Inscrição enviada! Deus te abençoe."); }
    </script>
</body>
</html>
