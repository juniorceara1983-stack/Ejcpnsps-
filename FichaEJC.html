<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJC - Pré-Inscrição</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #e2e8f0; color: #1e293b; padding: 20px; text-align: center; }
        .card { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .logo { max-width: 100px; border-radius: 50%; margin-bottom: 20px; }
        h1 { margin-bottom: 20px; color: #2563eb; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; }
        
        /* NOVO ESTILO DO BOTÃO DE FOTO - MODERNO E SEM BORDAS PONTILHADAS */
        .btn-foto { 
            display: inline-block; width: 100%; padding: 12px; margin: 10px 0; 
            background: #f1f5f9; color: #475569; border: 2px solid #cbd5e1; 
            border-radius: 10px; font-weight: bold; cursor: pointer; 
            transition: all 0.3s ease; box-sizing: border-box;
        }
        .btn-foto:hover { background: #e2e8f0; border-color: #94a3b8; }
        #preview { display: none; width: 100%; margin-top: 10px; border-radius: 10px; }

        .btn-submit { background: #2563eb; color: white; padding: 12px; width: 100%; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: background 0.3s; margin-top: 20px; }
        .btn-submit:hover { background: #1d4ed8; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: white; padding: 20px; border-radius: 10px; text-align: center; }
    </style>
</head>
<body>
    <div class="card">
        <img src="ejcmaracanau.jpeg" class="logo" alt="Logo EJC">
        <h1>PRÉ-INSCRIÇÃO</h1>
        <form id="formEJC">
            <input type="text" id="nome" required placeholder="NOME COMPLETO">
            <input type="text" id="cpf" required placeholder="CPF">
            <input type="date" id="nascimento" required placeholder="DATA DE NASCIMENTO">
            <input type="text" id="whatsapp" required placeholder="WHATSAPP">
            
            <input type="text" id="bairro" required placeholder="BAIRRO">
            
            <input type="text" id="cidade" required value="Maracanaú" readonly placeholder="CIDADE">
            
            <input type="text" id="paroquia" required value="PNSPS" readonly placeholder="PARÓQUIA">

            <div class="btn-foto" onclick="document.getElementById('foto').click()">
                <span id="txt-foto">🖼️ Adicionar Foto da Galeria</span>
            </div>
            
            <input type="file" id="foto" accept="image/png, image/jpeg, image/jpg" style="display:none" onchange="previewFoto(this)">
            
            <img id="preview" alt="Prévia da Foto">

            <button type="submit" class="btn-submit">ENVIAR FOTO E DADOS</button>
        </form>
    </div>

    <div id="meuModal" class="modal">
        <div class="modal-content">
            <h3>🎉 Sucesso!</h3>
            <p>Sua pré-inscrição foi recebida com sucesso. Deus abençoe!</p>
            <button onclick="location.reload()" class="btn-submit">FECHAR</button>
        </div>
    </div>

    <script>
        // MÁSCARAS DO CPF E WHATSAPP
        $(document).ready(function(){
            $('#cpf').mask('000.000.000-00');
            $('#whatsapp').mask('(00) 0 0000-0000');
        });

        let fotoBase64 = "";

        // FUNÇÃO DE PRÉVIA DA FOTO
        function previewFoto(input) {
            if (input.files && input.files[0]) {
                let reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('preview').src = e.target.result;
                    document.getElementById('preview').style.display = 'block';
                    document.getElementById('txt-foto').innerText = "✅ Foto Selecionada";
                    fotoBase64 = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // FUNÇÃO DE ENVIO DO FORMULÁRIO (MANTIDA ORIGINAL)
        document.getElementById('formEJC').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.querySelector('.btn-submit');
            btn.innerText = "Enviando... Aguarde.";
            btn.disabled = true;

            const dados = {
                "Nome": document.getElementById('nome').value,
                "CPF": document.getElementById('cpf').value,
                "Nascimento": document.getElementById('nascimento').value,
                "whatsapp": document.getElementById('whatsapp').value,
                "Bairro": document.getElementById('bairro').value,
                "Cidade": document.getElementById('cidade').value,
                "Paroquia": document.getElementById('paroquia').value,
                "Foto": fotoBase64
            };

            const SCRIPT_URL = "SUA_URL_DO_GOOGLE_SCRIPT_AQUI"; // Certifique-se de preencher aqui

            await fetch(SCRIPT_URL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify(dados) 
            });
            
            document.getElementById('meuModal').style.display = 'flex';
        };
    </script>
</body>
</html>
