<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJC - Inscrição 2026</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    
    <style>
        :root { --primary: #2563eb; --pnsps: #e6e0f3; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; padding: 15px; margin: 0; }
        .container { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); border-top: 10px solid var(--primary); position: relative; }
        .header { text-align: center; margin-bottom: 25px; }
        .logo { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 3px solid var(--pnsps); margin-bottom: 10px; }
        label { display: block; margin-top: 15px; font-weight: 600; font-size: 0.85rem; color: #64748b; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1.5px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        
        /* BOTÃO DE FOTO MODERNO - SEM BORDAS PONTILHADAS */
        .btn-foto-nova {
            margin-top: 20px;
            background: #f8fafc;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 14px;
            border-radius: 12px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-foto-nova:active { background: #e0e7ff; transform: scale(0.98); }
        
        #preview { width: 100%; margin-top: 15px; border-radius: 15px; display: none; border: 2px solid var(--pnsps); }
        .btn-enviar { width: 100%; background: var(--primary); color: white; border: none; padding: 18px; border-radius: 12px; margin-top: 25px; font-size: 1rem; font-weight: bold; cursor: pointer; }
        
        /* MODAL DO PADRE LUCIANO */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; align-items:center; justify-content:center; padding:20px; box-sizing:border-box; }
        .modal-content { background:white; padding:30px; border-radius:20px; width:100%; max-width:400px; text-align:center; position:relative; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <img src="ejcmaracanau.jpeg" class="logo">
            <h2 style="margin:0; color:#1e293b;">Pré-Inscrição EJC</h2>
            <small style="color:#64748b;">Paróquia Nossa Senhora dos Prazeres e Santa Paula Frassinetti</small>
        </div>

        <form id="formEJC">
            <label>Nome</label>
            <input type="text" id="Nome" required>

            <label>CPF</label>
            <input type="text" id="CPF" required placeholder="000.000.000-00">

            <label>Idade</label>
            <input type="date" id="Idade" required>

            <label>WHATSAPP (COM DDD)</label>
            <input type="text" id="whatsapp" required placeholder="(00) 0 0000-0000">

            <label>RUA E NÚMERO</label>
            <input type="text" id="Rua" required>

            <label>BAIRRO</label>
            <input type="text" id="Bairro" required>

            <label>CIDADE</label>
            <input type="text" id="Cidade" value="Maracanaú" readonly required>

            <div class="btn-foto-nova" onclick="document.getElementById('fotoInput').click()">
                🖼️ ADICIONAR FOTO DA GALERIA
            </div>

            <input type="file" id="fotoInput" accept="image/*" style="display:none" onchange="previewImage(this)">
            
            <img id="preview">

            <button type="submit" class="btn-enviar" id="btnAcao">ENVIAR INSCRIÇÃO</button>
        </form>
    </div>

    <div id="meuModal" class="modal">
        <div class="modal-content">
            <img src="ejcmaracanau.jpeg" style="width:80px; border-radius:50%; margin-bottom:15px;">
            <p id="msgTexto" style="white-space: pre-line; line-height:1.5; color:#334155; font-weight:500;"></p>
            <button onclick="location.reload()" class="btn-enviar">AMÉM!</button>
        </div>
    </div>

    <script>
        // ALTERAÇÃO: MÁSCARAS AUTOMÁTICAS (IDs Corrigidos para bater com o HTML)
        $(document).ready(function(){
            $('#CPF').mask('000.000.000-00');
            $('#whatsapp').mask('(00) 0 0000-0000');
        });

        const mensagensEJC = [
            "\"Não tenhas medo, que Eu estou contigo!\" (Is 41,10)",
            "\"Onde estiver o teu tesouro, ali estará também o teu coração.\" (Mt 6,21)",
            "\"Tudo posso Naquele que me fortalece!\" (Fl 4,13)",
            "\"Jovem, eu te digo: levanta-te!\" (Lc 7,14)",
            "\"Seja feita a vossa vontade!\""
        ];

        let fotoProntaBase64 = "";

        function previewImage(input) {
            if (input.files && input.files[0]) {
                let reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.width = 600;
                        canvas.height = (img.height / img.width) * 600;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        fotoProntaBase64 = canvas.toDataURL('image/jpeg', 0.7);
                        document.getElementById('preview').src = fotoProntaBase64;
                        document.getElementById('preview').style.display = 'block';
                    }
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        document.getElementById('formEJC').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnAcao');
            
            // LEMBRE-SE DE COLOCAR SUA URL DO GOOGLE SCRIPT AQUI
            const SCRIPT_URL = "SUA_URL_AQUI"; 

            try {
                btn.innerText = "ENVIANDO..."; btn.disabled = true;

                // CORREÇÃO DOS IDs: Agora batem exatamente com os IDs do seu HTML acima
                const dados = {
                    "Nome": document.getElementById('Nome').value,
                    "CPF": document.getElementById('CPF').value,
                    "Idade": document.getElementById('Idade').value,
                    "whatsapp": document.getElementById('whatsapp').value,
                    "Rua": document.getElementById('Rua').value,
                    "Bairro": document.getElementById('Bairro').value,
                    "Cidade": document.getElementById('Cidade').value,
                    "foto": fotoProntaBase64
                };

                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(dados) });

                // MENSAGEM DO PADRE LUCIANO
                const msgAleatoria = mensagensEJC[Math.floor(Math.random() * mensagensEJC.length)];
                document.getElementById('msgTexto').innerText = "Olá! Eu sou o Padre Luciano. Que Deus te abençoe.\nSua Pré-inscrição foi recebida com sucesso!\n\nSua missão agora é:\n" + msgAleatoria;
                document.getElementById('meuModal').style.display = 'flex';

            } catch (e) {
                alert("Erro ao conectar. Tente novamente.");
                btn.innerText = "ENVIAR INSCRIÇÃO"; btn.disabled = false;
            }
        }
    </script>
</body>
</html>
