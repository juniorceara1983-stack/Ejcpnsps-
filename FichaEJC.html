<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJC - Inscrição 2026</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    <style>
        :root { --primary: #2563eb; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; padding: 15px; margin: 0; }
        .container { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); border-top: 10px solid var(--primary); }
        .header { text-align: center; margin-bottom: 25px; }
        .logo { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; }
        label { display: block; margin-top: 15px; font-weight: 600; color: #64748b; font-size: 0.85rem; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1.5px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; }
        .btn-foto { margin-top: 20px; background: #f8fafc; border: 2px solid var(--primary); color: var(--primary); padding: 14px; border-radius: 12px; font-weight: bold; text-align: center; cursor: pointer; }
        #preview { width: 100%; margin-top: 15px; border-radius: 15px; display: none; }
        .btn-enviar { width: 100%; background: var(--primary); color: white; border: none; padding: 18px; border-radius: 12px; margin-top: 25px; font-weight: bold; cursor: pointer; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center; }
        .modal-content { background:white; padding:30px; border-radius:20px; text-align:center; max-width:400px; }
        .foto-padre { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 3px solid var(--primary); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="ejcmaracanau.jpeg" class="logo">
            <h2>Pré-Inscrição EJC</h2>
        </div>
        <form id="formEJC">
            <label>NOME COMPLETO</label><input type="text" id="Nome" required>
            <label>CPF</label><input type="text" id="CPF" required placeholder="000.000.000-00">
            <label>DATA DE NASCIMENTO</label><input type="date" id="Idade" required>
            <label>WHATSAPP</label><input type="text" id="whatsapp" required placeholder="(00) 0 0000-0000">
            <label>RUA E NÚMERO</label><input type="text" id="Rua" required>
            <label>BAIRRO</label><input type="text" id="Bairro" required>
            <label>CIDADE</label><input type="text" id="Cidade" value="Maracanaú" readonly>

            <div class="btn-foto" onclick="document.getElementById('f').click()">🖼️ ADICIONAR FOTO</div>
            <input type="file" id="f" accept="image/*" style="display:none" onchange="preview(this)">
            <img id="preview">
            <button type="submit" class="btn-enviar" id="btn">ENVIAR INSCRIÇÃO</button>
        </form>
    </div>

    <div id="meuModal" class="modal">
        <div class="modal-content">
            <img src="IMG_20260401_014539.jpg" class="foto-padre">
            <p id="msg" style="white-space: pre-line; font-weight: 500;"></p>
            <button onclick="location.reload()" class="btn-enviar">AMÉM!</button>
        </div>
    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbzo_A9kOeOpWkYXWREznU7zPE9UDQVLah2fI5CLv_Yl-aRCiZkegTnw8uRa6fTb78ny/exec";
        
        $(document).ready(() => {
            $('#CPF').mask('000.000.000-00');
            $('#whatsapp').mask('(00) 0 0000-0000');
        });

        let fotoBase64 = "";
        function preview(i) {
            if (i.files && i.files[0]) {
                let r = new FileReader();
                r.onload = (e) => {
                    fotoBase64 = e.target.result;
                    $('#preview').attr('src', fotoBase64).show();
                };
                r.readAsDataURL(i.files[0]);
            }
        }

        document.getElementById('formEJC').onsubmit = async (e) => {
            e.preventDefault();
            $('#btn').text("ENVIANDO...").prop('disabled', true);
            const dados = {
                Nome: $('#Nome').val(),
                CPF: $('#CPF').val(),
                Idade: $('#Idade').val(),
                whatsapp: $('#whatsapp').val(),
                Rua: $('#Rua').val(),
                Bairro: $('#Bairro').val(),
                Cidade: $('#Cidade').val(),
                foto: fotoBase64
            };
            try {
                await fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(dados) });
                $('#msg').text("Olá! Eu sou o Padre Luciano.\nSua inscrição foi recebida com sucesso!");
                $('#meuModal').css('display', 'flex');
            } catch (err) { alert("Erro ao enviar."); $('#btn').text("ENVIAR").prop('disabled', false); }
        };
    </script>
</body>
</html>
