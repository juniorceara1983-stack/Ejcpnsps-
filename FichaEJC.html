<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJC - Inscrição 2026</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    <style>
        :root { --primary: #2563eb; --pnsps: #e6e0f3; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; padding: 15px; margin: 0; }
        .container { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); border-top: 10px solid var(--primary); }
        .header { text-align: center; margin-bottom: 25px; }
        .logo { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 3px solid var(--pnsps); }
        label { display: block; margin-top: 15px; font-weight: 600; font-size: 0.85rem; color: #64748b; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1.5px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; }
        .btn-foto-nova { margin-top: 20px; background: #f8fafc; border: 2px solid var(--primary); color: var(--primary); padding: 14px; border-radius: 12px; font-weight: bold; text-align: center; cursor: pointer; }
        #preview { width: 100%; margin-top: 15px; border-radius: 15px; display: none; }
        .btn-enviar { width: 100%; background: var(--primary); color: white; border: none; padding: 18px; border-radius: 12px; margin-top: 25px; font-weight: bold; cursor: pointer; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center; padding:20px; }
        .modal-content { background:white; padding:30px; border-radius:20px; text-align:center; max-width:400px; }
        .foto-padre { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 3px solid var(--primary); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="ejcmaracanau.jpeg" class="logo">
            <h2>Pré-Inscrição EJC</h2>
        </div>
        <form id="formEJC">
            <label>NOME COMPLETO</label>
            <input type="text" id="nome" required>
            <label>CPF</label>
            <input type="text" id="cpf" required placeholder="000.000.000-00">
            <label>DATA DE NASCIMENTO</label>
            <input type="date" id="nascimento" required>
            <label>WHATSAPP</label>
            <input type="text" id="whatsapp" required placeholder="(00) 0 0000-0000">
            <label>RUA E NÚMERO</label>
            <input type="text" id="rua" required>
            <label>BAIRRO</label>
            <input type="text" id="bairro" required>
            <label>CIDADE</label>
            <input type="text" id="cidade" value="Maracanaú" readonly required>

            <div class="btn-foto-nova" onclick="document.getElementById('fotoInput').click()">🖼️ ADICIONAR FOTO DA GALERIA</div>
            <input type="file" id="fotoInput" accept="image/*" style="display:none" onchange="previewImage(this)">
            <img id="preview">
            <button type="submit" class="btn-enviar" id="btnAcao">ENVIAR INSCRIÇÃO</button>
        </form>
    </div>

    <div id="meuModal" class="modal">
        <div class="modal-content">
            <img src="IMG_20260401_014539.jpg" class="foto-padre">
            <p id="msgTexto" style="white-space: pre-line;"></p>
            <button onclick="location.reload()" class="btn-enviar">AMÉM!</button>
        </div>
    </div>

    <script>
        $(document).ready(function(){
            $('#cpf').mask('000.000.000-00');
            $('#whatsapp').mask('(00) 0 0000-0000');
        });

        const mensagensEJC = ["\"Não tenhas medo, que Eu estou contigo!\"", "\"Tudo posso Naquele que me fortalece!\"", "\"Jovem, eu te digo: levanta-te!\""];
        let fotoProntaBase64 = "";

        function previewImage(input) {
            if (input.files && input.files[0]) {
                let reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.width = 600; canvas.height = (img.height / img.width) * 600;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        fotoProntaBase64 = canvas.toDataURL('image/jpeg', 0.7);
                        document.getElementById('preview').src = fotoProntaBase64;
                        document.getElementById('preview').style.display = 'block';
                    }
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        document.getElementById('formEJC').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnAcao');
            const SCRIPT_URL = "SUA_URL_DO_GOOGLE_AQUI"; // Coloque sua URL aqui!

            try {
                btn.innerText = "ENVIANDO..."; btn.disabled = true;
                const dados = {
                    "Nome": document.getElementById('nome').value,
                    "CPF": document.getElementById('cpf').value,
                    "Idade": document.getElementById('nascimento').value,
                    "whatsapp": document.getElementById('whatsapp').value,
                    "Rua": document.getElementById('rua').value,
                    "Bairro": document.getElementById('bairro').value,
                    "Cidade": document.getElementById('cidade').value,
                    "foto": fotoProntaBase64
                };
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(dados) });
                document.getElementById('msgTexto').innerText = "Olá! Eu sou o Padre Luciano.\nSua inscrição foi recebida!\n\n" + mensagensEJC[Math.floor(Math.random() * mensagensEJC.length)];
                document.getElementById('meuModal').style.display = 'flex';
            } catch (e) { alert("Erro ao enviar."); btn.disabled = false; }
        }
    </script>
</body>
</html>
