<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJC - Inscrição 2026</title>
    <style>
        :root { --primary: #2563eb; --pnsps: #e6e0f3; --danger: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; padding: 15px; margin: 0; }
        .container { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); border-top: 10px solid var(--primary); position: relative; }
        .header { text-align: center; margin-bottom: 25px; }
        .logo { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 3px solid var(--pnsps); margin-bottom: 10px; }
        
        /* Efeito de Alto Relevo nos Rótulos */
        label { 
            display: block; 
            margin-top: 15px; 
            font-weight: 700; 
            font-size: 0.85rem; 
            color: #475569; 
            text-shadow: 1px 1px 1px rgba(0,0,0,0.05); 
        }
        
        /* Efeito de Alto Relevo nos Inputs */
        input:not([type="checkbox"]), select { 
            width: 100%; 
            padding: 12px; 
            margin-top: 5px; 
            border: 1px solid #e2e8f0; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 1rem; 
            background: #ffffff;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.03), 0 1px 2px rgba(0,0,0,0.05);
            transition: all 0.3s;
        }
        input:not([type="checkbox"]):focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        
        /* Botão de Foto Melhorado (Sem pontilhado e com Relevo) */
        .photo-upload { 
            background: #ffffff; 
            border: 1px solid #e2e8f0; 
            padding: 25px; 
            text-align: center; 
            border-radius: 15px; 
            cursor: pointer; 
            margin-top: 10px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            transition: transform 0.2s;
        }
        .photo-upload:active { transform: scale(0.98); }
        
        #preview { width: 120px; height: 160px; border-radius: 8px; margin-top: 10px; display: none; object-fit: cover; border: 2px solid white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-enviar { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem; margin-top: 25px; cursor: pointer; box-shadow: 0 4px 6px rgba(37, 99, 235, 0.2); }
        .btn-enviar:disabled { background: #94a3b8; }
        
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 24px; width: 85%; max-width: 340px; text-align: center; }
        .modal-img { width: 130px; height: 130px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 4px solid var(--primary); }
        .signature { text-align: center; margin-top: 20px; font-size: 0.75rem; color: #94a3b8; font-weight: 500; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="ejcmaracanau.jpeg" class="logo">
            <h1 style="font-size:1.3rem; color:var(--primary); margin: 5px 0;">PRÉ-FICHA EJC</h1>
            <p style="font-size: 0.8rem; color: #94a3b8;">PNSPS - Maracanaú</p>
        </div>

        <form id="formEJC">
            <label>Sua Foto (Estilo 3x4)</label>
            <div class="photo-upload" onclick="document.getElementById('inputFoto').click()">
                <span id="txtFoto" style="color:var(--primary); font-weight:bold; font-size: 0.9rem;">📸 Clique para tirar foto ou galeria</span>
                <input type="file" id="inputFoto" accept="image/*" style="display:none" onchange="processarFoto(this)">
                <center><img id="preview"></center>
            </div>

            <label>Nome Completo</label>
            <input type="text" id="nome" required>
            
            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>CPF <span style="font-size:0.7rem; color:#94a3b8; font-weight:400;">(ou RG)</span></label>
                    <input type="text" id="cpf" maxlength="14" placeholder="000.000.000-00" oninput="mascaraCPF(this)">
                </div>
                <div style="flex: 1;">
                    <label>RG <span style="font-size:0.7rem; color:#94a3b8; font-weight:400;">(ou CPF)</span></label>
                    <input type="text" id="rg" maxlength="20" placeholder="00.000.000-0" oninput="mascaraRG(this)">
                </div>
            </div>

            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>Data Nasc.</label>
                    <input type="date" id="nascimento" required onchange="calcularIdadeForm()">
                    <div id="idadeDisplay" style="font-size:0.82rem; color:#2563eb; font-weight:700; margin-top:5px; display:none;"></div>
                </div>
                <div style="flex: 1;"> <label>WhatsApp</label> <input type="tel" id="whatsapp" placeholder="(85) 9..." oninput="mascaraWhats(this)" required> </div>
            </div>

            <label>Rua e Número</label>
            <input type="text" id="rua">
            
            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;"> <label>Bairro</label> <input type="text" id="bairro" required> </div>
                <div style="flex: 1;"> <label>Cidade</label> <input type="text" id="cidade" value="Maracanaú" required> </div>
            </div>

            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>Estado Civil</label>
                    <select id="estadoCivil" required>
                        <option value="">Selecione...</option>
                        <option value="Solteiro(a)">Solteiro(a)</option>
                        <option value="Casado(a)">Casado(a)</option>
                        <option value="Outro">Outro</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <label>Grau de Instrução</label>
                    <select id="grauInstrucao" required>
                        <option value="">Selecione...</option>
                        <option value="Ensino Fundamental">Ensino Fundamental</option>
                        <option value="Ensino Médio">Ensino Médio</option>
                        <option value="Ensino Superior">Ensino Superior</option>
                    </select>
                </div>
            </div>

            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>Você trabalha atualmente?</label>
                    <select id="trabalhaAtualmente" onchange="toggleTrabalhoAlert()" required>
                        <option value="">Selecione...</option>
                        <option value="Sim">Sim</option>
                        <option value="Não">Não</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <label>Participa de algum movimento de jovens?</label>
                    <select id="participaMovimento" onchange="toggleMovimentoQual()" required>
                        <option value="">Selecione...</option>
                        <option value="Sim">Sim</option>
                        <option value="Não">Não</option>
                    </select>
                </div>
            </div>

            <div id="alertaTrabalho" style="display:none; background:var(--danger); color:#fff; border-radius:10px; padding:10px 12px; margin-top:10px; font-size:0.88rem; font-weight:600;">
                ⚠️ Atenção: É necessário pedir dispensa do trabalho durante os 3 dias do Encontro.
            </div>

            <div id="campoQualMovimento" style="display:none;">
                <label>Qual?</label>
                <input type="text" id="qualMovimento" placeholder="Informe o movimento">
            </div>

            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>Convidado por</label>
                    <input type="text" id="convidadoPor" placeholder="Nome de quem convidou">
                </div>
                <div style="flex: 1;">
                    <label>WhatsApp do Convidante</label>
                    <input type="tel" id="whatsappConvidante" placeholder="(85) 9..." oninput="mascaraWhats(this)">
                </div>
            </div>

            <label style="display:flex; align-items:flex-start; gap:8px; font-size:0.9rem; font-weight:500;">
                <input type="checkbox" id="declaracaoPresenca" required style="margin-top:3px;">
                Declaro estar ciente que devo estar presente durante todos os horários dos 3 dias de Encontro.
            </label>

            <button type="button" class="btn-enviar" id="btnAcao" onclick="enviar()">ENVIAR INSCRIÇÃO</button>
        </form>

        <div class="signature">By: Jr&Iz</div>
    </div>

    <div id="meuModal" class="modal">
        <div class="modal-content">
            <img src="IMG_20260401_014539.jpg" class="modal-img">
            <p id="msgTexto" style="font-weight: 500; color: #1e293b; white-space: pre-line; line-height: 1.4;"></p>
            <button class="btn-enviar" onclick="location.reload()">ENTENDIDO</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzo_A9kOeOpWkYXWREznU7zPE9UDQVLah2fI5CLv_Yl-aRCiZkegTnw8uRa6fTb78ny/exec";
        let fotoProntaBase64 = "";

        const mensagensEJC = [
            "📖 'Ninguém te despreze por seres jovem; mas sê exemplo para os fiéis.' (1 Timóteo 4:12)",
            "📖 'Tudo posso naquele que me fortalece.' (Filipenses 4:13)",
            "📖 'O Senhor é o meu pastor, nada me faltará.' (Salmo 23:1)",
            "📖 'Ide por todo o mundo e pregai o Evangelho a toda criatura.' (Marcos 16:15)",
            "📖 'Vós sois o sal da terra e a luz do mundo.' (Mateus 5:13-14)",
            "📖 'Eu sou o caminho, a verdade e a vida.' (João 14:6)",
            "📖 'Seja forte e corajoso! Não se apavore nem desanime.' (Josué 1:9)",
            "🙏 Oração: Senhor, fazei de mim um instrumento de vossa paz.",
            "🙏 Oração: Santo Anjo do Senhor, meu zeloso guardador, iluminai-me!",
            "🙏 Oração: Maria, passa na frente e guia cada passo do meu encontro.",
            "✨ Missão: Reze uma Ave-Maria hoje por outro jovem que também se inscreveu.",
            "✨ Missão: Sorria para alguém hoje e mostre a alegria de ser cristão.",
            "✨ Missão: Leia o Evangelho de hoje antes de dormir.",
            "🔥 Engajamento: O EJC é um serviço de amor. Prepare o seu coração!",
            "🔥 Engajamento: Você não foi escolhido por acaso. Deus tem um plano para você!",
            "🔥 Engajamento: Ser jovem cristão é ser revolucionário no amor.",
            "🕊️ 'Onde houver ódio, que eu leve o amor.' (São Francisco de Assis)",
            "🕊️ 'A medida do amor é amar sem medida.' (Santo Agostinho)",
            "📖 'Buscai primeiro o Reino de Deus e tudo o mais vos será acrescentado.' (Mateus 6:33)",
            "📖 'O amor é paciente, o amor é bondoso.' (1 Coríntios 13:4)"
        ];

        function mascaraCPF(i) {
            let v = i.value.replace(/\D/g, "");
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
            i.value = v;
        }

        function mascaraRG(i) {
            let raw = i.value.toUpperCase();
            const trailingX = raw.endsWith('X');
            let v = raw.replace(/\D/g, "");
            v = v.replace(/(\d{2})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d+)$/, "$1-$2");
            if (trailingX) v = `${v}${v.includes('-') ? '' : '-'}X`;
            i.value = v;
        }

        function calcularIdadeForm() {
            const nascimento = document.getElementById('nascimento').value;
            const display = document.getElementById('idadeDisplay');
            if (!nascimento) { display.style.display = 'none'; return; }
            const hoje = new Date();
            const nasc = new Date(nascimento);
            if (isNaN(nasc)) { display.style.display = 'none'; return; }
            let idade = hoje.getFullYear() - nasc.getFullYear();
            const m = hoje.getMonth() - nasc.getMonth();
            if (m < 0 || (m === 0 && hoje.getDate() < nasc.getDate())) idade--;
            display.textContent = `🎂 ${idade} anos completos`;
            display.style.display = 'block';
        }

        function toggleTrabalhoAlert() {
            const mostrar = document.getElementById('trabalhaAtualmente').value === 'Sim';
            document.getElementById('alertaTrabalho').style.display = mostrar ? 'block' : 'none';
        }

        function toggleMovimentoQual() {
            const mostrar = document.getElementById('participaMovimento').value === 'Sim';
            const campo = document.getElementById('campoQualMovimento');
            const input = document.getElementById('qualMovimento');
            campo.style.display = mostrar ? 'block' : 'none';
            if (!mostrar) input.value = '';
        }

        function mascaraWhats(i) {
            let v = i.value.replace(/\D/g, "");
            v = v.replace(/^(\d{2})(\d)/g, "($1) $2");
            v = v.replace(/(\d)(\d{4})$/, "$1-$2");
            i.value = v;
        }

        function processarFoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        canvas.width = 240; canvas.height = 320;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, 240, 320);
                        fotoProntaBase64 = canvas.toDataURL('image/jpeg', 0.6); 
                        document.getElementById('preview').src = fotoProntaBase64;
                        document.getElementById('preview').style.display = 'block';
                        document.getElementById('txtFoto').innerText = "Foto Ajustada ✅";
                    }
                    img.src = e.target.result;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function enviar() {
            const btn = document.getElementById('btnAcao');
            const nome = document.getElementById('nome').value;
            const cpfInput = document.getElementById('cpf').value;
            const rgInput = document.getElementById('rg').value;
            const whatsapp = document.getElementById('whatsapp').value;
            const declaracaoPresenca = document.getElementById('declaracaoPresenca').checked;
            const trabalhaAtualmente = document.getElementById('trabalhaAtualmente').value;
            const participaMovimento = document.getElementById('participaMovimento').value;

            const restaurarBotaoEnvio = () => {
                btn.innerText = "ENVIAR INSCRIÇÃO";
                btn.disabled = false;
                btn.style.backgroundColor = "var(--primary)";
                btn.style.opacity = "1";
                btn.style.cursor = "pointer";
            };

            if(!nome) return alert("Por favor, digite seu nome completo.");
            if(!cpfInput && !rgInput) return alert("Por favor, preencha o CPF ou o RG.");
            if(cpfInput && cpfInput.replace(/\D/g,'').length < 11) return alert("CPF incompleto. Verifique o preenchimento.");
            if(!whatsapp || whatsapp.length < 11) return alert("Por favor, preencha o WhatsApp com DDD.");
            if(!trabalhaAtualmente) return alert("Por favor, informe se você trabalha atualmente.");
            if(!participaMovimento) return alert("Por favor, informe se participa de movimento de jovens.");
            if(participaMovimento === "Sim" && !document.getElementById('qualMovimento').value.trim()) return alert("Por favor, informe qual movimento você participa.");
            if(!declaracaoPresenca) return alert("É obrigatório declarar ciência sobre a presença nos 3 dias.");
            if(!fotoProntaBase64) return alert("A foto é obrigatória para a ficha!");
            
            const cpfFinal = String(cpfInput);
            btn.innerText = "VERIFICANDO...";
            btn.disabled = true;
            btn.style.backgroundColor = "#94a3b8";
            btn.style.opacity = "0.9";
            btn.style.cursor = "not-allowed";

            try {
                const response = await fetch(SCRIPT_URL);
                const lista = await response.json();
                
                if(cpfFinal && cpfFinal.replace(/\D/g,'').length === 11) {
                    const jaCadastrado = lista.find(p => {
                        const cpfNaPlanilha = String(p.CPF || p.cpf || p[1] || "").replace(/\D/g, '');
                        const cpfDigitadoLimpo = cpfFinal.replace(/\D/g, '');
                        return cpfNaPlanilha === cpfDigitadoLimpo;
                    });

                    if(jaCadastrado) {
                        mostrarModal("⚠️ Atenção:\nEste CPF já possui uma inscrição ativa para o EJC 2026.");
                        restaurarBotaoEnvio();
                        return;
                    }
                }

                const dados = {
                    "Nome": nome,
                    "CPF": cpfFinal,
                    "RG": rgInput,
                    "Idade": document.getElementById('nascimento').value,
                    "whatsapp": whatsapp,
                    "Rua": document.getElementById('rua').value,
                    "Bairro": document.getElementById('bairro').value,
                    "Cidade": document.getElementById('cidade').value,
                    "Estado Civil": document.getElementById('estadoCivil').value,
                    "Grau de Instrução": document.getElementById('grauInstrucao').value,
                    "Trabalha Atualmente": trabalhaAtualmente,
                    "Participa de Movimento": participaMovimento,
                    "Qual Movimento": document.getElementById('qualMovimento').value,
                    "Convidado por": document.getElementById('convidadoPor').value,
                    "WhatsApp do Convidante": document.getElementById('whatsappConvidante').value,
                    "Declaração Presença": declaracaoPresenca ? "Sim" : "Não",
                    "foto": fotoProntaBase64
                };

                await fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify(dados) 
                });

                const msgAleatoria = mensagensEJC[Math.floor(Math.random() * mensagensEJC.length)];
                mostrarModal("Olá! Eu sou o Padre Luciano. que Deus te abençoe.\nSua Pré-inscrição foi recebida com sucesso!\n\nSua missão agora é:\n" + msgAleatoria);

            } catch (e) { 
                console.error(e);
                alert("Erro ao conectar. Tente novamente."); 
                restaurarBotaoEnvio();
            }
        }

        function mostrarModal(txt) {
            document.getElementById('msgTexto').innerText = txt;
            document.getElementById('meuModal').style.display = 'flex';
        }
    </script>
</body>
</html>
