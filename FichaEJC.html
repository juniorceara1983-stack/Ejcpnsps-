<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJC - Inscrição 2026</title>
    <style>
        :root { --pnsps: #e6e0f3; --ejc: #2563eb; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; margin: 0; padding: 15px; }
        .container { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); border-top: 10px solid var(--pnsps); }
        .header { text-align: center; margin-bottom: 25px; }
        .logo { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--pnsps); margin-bottom: 10px; }
        label { display: block; margin-top: 15px; font-weight: 600; font-size: 0.85rem; color: #64748b; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1.5px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; }
        .btn-enviar { width: 100%; padding: 16px; background: var(--ejc); color: white; border: none; border-radius: 12px; font-weight: bold; margin-top: 25px; cursor: pointer; }
        
        /* Estilo da Janela de Mensagem (Modal) */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 20px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; animation: pop 0.3s; }
        .modal-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 3px solid var(--ejc); }
        @keyframes pop { from {transform: scale(0.7);} to {transform: scale(1);} }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="1774975668180.png" class="logo">
            <h1 style="font-size:1.3rem; color:var(--ejc)">PRÉ-FICHA EJC</h1>
        </div>

        <form id="formEJC">
            <label>Nome Completo</label>
            <input type="text" id="nome" required>
            <label>CPF (Apenas números)</label>
            <input type="number" id="cpf" required>
            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;"> <label>Data Nasc.</label> <input type="date" id="nascimento" required> </div>
                <div style="flex: 1;"> <label>WhatsApp</label> <input type="tel" id="telefone" required> </div>
            </div>
            <label>Rua e Número</label>
            <input type="text" id="rua">
            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;"> <label>Bairro</label> <input type="text" id="bairro" required> </div>
                <div style="flex: 1;"> <label>Cidade</label> <input type="text" id="cidade" value="Maracanaú" required> </div>
            </div>
            <button type="button" class="btn-enviar" id="btnAcao" onclick="enviarParaPlanilha()">ENVIAR INSCRIÇÃO</button>
        </form>
    </div>

    <div id="meuModal" class="modal">
        <div class="modal-content">
            <img src="IMG_20260401_014539.jpg" class="modal-img">
            <p id="msgTexto" style="font-weight: 500; color: #334155; line-height: 1.4;"></p>
            <button class="btn-enviar" style="margin-top:15px; padding:10px" onclick="fecharModal()">OK</button>
        </div>
    </div>

    <script>
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbzo_A9kOeOpWkYXWREznU7zPE9UDQVLah2fI5CLv_Yl-aRCiZkegTnw8uRa6fTb78ny/exec";

        function fecharModal() { document.getElementById('meuModal').style.display = 'none'; location.reload(); }

        async function enviarParaPlanilha() {
            const btn = document.getElementById('btnAcao');
            const cpfDigitado = document.getElementById('cpf').value;
            const nomeDigitado = document.getElementById('nome').value;
            const dataNasc = document.getElementById('nascimento').value;

            if(!cpfDigitado || !nomeDigitado || !dataNasc) return alert("Preencha os campos obrigatórios!");

            btn.innerText = "VALIDANDO..."; btn.disabled = true;

            try {
                const res = await fetch(URL_SCRIPT);
                const lista = await res.json();
                const jaExiste = lista.find(p => p.cpf == cpfDigitado);

                if(jaExiste) {
                    document.getElementById('msgTexto').innerText = "Olá tudo bem, esse CPF já tem um registro, por favor fale com a equipe dirigente";
                    document.getElementById('meuModal').style.display = 'flex';
                    btn.innerText = "ENVIAR INSCRIÇÃO"; btn.disabled = false;
                    return;
                }

                // Formata Data DD/MM/AAAA
                const p = dataNasc.split('-');
                const dataBR = `${p[2]}/${p[1]}/${p[0]}`;

                const dados = {
                    nome: nomeDigitado, cpf: cpfDigitado, nascimento: dataBR,
                    telefone: document.getElementById('telefone').value,
                    rua: document.getElementById('rua').value,
                    bairro: document.getElementById('bairro').value,
                    cidade: document.getElementById('cidade').value,
                    foto: "Salva na planilha"
                };

                await fetch(URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify(dados) });

                document.getElementById('msgTexto').innerText = "Olá eu sou o Padre Luciano, tudo bem?\nObg pela inscrição, aguarde o contato";
                document.getElementById('meuModal').style.display = 'flex';

            } catch (e) { alert("Erro de conexão."); btn.disabled = false; }
        }
    </script>
</body>
</html>
